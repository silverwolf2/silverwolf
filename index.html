}

function renderKuta(aPos,bPos,aName,bName){
  const T=(toJD(new Date())-2451545)/36525;
  const ay=getAyanamsa(T);
  const aMoonSid=n360(aPos.Moon-ay); const bMoonSid=n360(bPos.Moon-ay);
  const aMoonSign=gSign(aMoonSid); const bMoonSign=gSign(bMoonSid);
  const aMoonNak=Math.floor(aMoonSid/(360/27)); const bMoonNak=Math.floor(bMoonSid/(360/27));

  // Vedic nakshatra rulers for Graha Maitri
  const nakRulers=['Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury','Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury','Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury'];
  const planetFriends={Sun:['Moon','Mars','Jupiter'],Moon:['Sun','Mercury'],Mars:['Sun','Moon','Jupiter'],Mercury:['Sun','Venus'],Jupiter:['Sun','Moon','Mars'],Venus:['Mercury','Saturn'],Saturn:['Mercury','Venus','Rahu'],Rahu:['Venus','Saturn'],Ketu:['Mars','Jupiter']};
  const planetEnemies={Sun:['Venus','Saturn','Rahu'],Moon:['Rahu','Ketu'],Mars:['Mercury','Rahu'],Mercury:['Moon'],Jupiter:['Mercury','Venus','Rahu'],Venus:['Sun','Moon'],Saturn:['Sun','Moon','Mars'],Rahu:['Sun','Moon','Mars'],Ketu:['Venus','Saturn']};

  // Yoni (animal) groups
  const yoniGroups=[
    ['Ashwini','Shatabhisha'],['Bharani','Revati'],['Pushya','Krittika'],['Rohini','Mrigashira'],
    ['Moola','Ardra'],['Punarvasu','Ashlesha'],['Magha','Purva Phalguni'],['Uttara Phalguni','Uttara Bhadrapada'],
    ['Hasta','Swati'],['Chitra','Vishakha'],['Anuradha','Jyeshtha'],['Purva Ashadha','Shravana'],
    ['Uttara Ashadha','Purva Bhadrapada'],['Dhanishtha','Shatabhisha']
  ];

  // Gana groups (Deva/Manushya/Rakshasa)
  const gana=['Deva','Manushya','Rakshasa'];
  const ganaNaks={Deva:[0,5,6,8,13,17,21,22,26],Manushya:[1,2,9,10,11,14,15,18,19],Rakshasa:[3,4,7,12,16,20,23,24,25]};
  function getGana(nakIdx){ if(ganaNaks.Deva.includes(nakIdx%27))return 'Deva'; if(ganaNaks.Manushya.includes(nakIdx%27))return 'Manushya'; return 'Rakshasa'; }

  // Nadi (vata/pitta/kapha)
  function getNadi(nakIdx){ const n=nakIdx%27; if([0,3,6,9,12,15,18,21,24].includes(n))return 'Vata'; if([1,4,7,10,13,16,19,22,25].includes(n))return 'Pitta'; return 'Kapha'; }

  // Calculate Kutas
  const kutaResults=[];

  // 1. Varna (1 max)
  const varnaSigns={Brahmin:[3,11,7],Kshatriya:[0,4,8],Vaishya:[1,5,9],Shudra:[2,6,10]};
  const getVarna=s=>{ for(const[k,v] of Object.entries(varnaSigns))if(v.includes(s))return k; return 'Shudra'; };
  const aVarna=getVarna(aMoonSign); const bVarna=getVarna(bMoonSign);
  const varnaOrder=['Brahmin','Kshatriya','Vaishya','Shudra'];
  const varnaScore=varnaOrder.indexOf(aVarna)>=varnaOrder.indexOf(bVarna)?1:0;
  kutaResults.push({name:'Varna',score:varnaScore,max:1,detail:`${aName}: ${aVarna} | ${bName}: ${bVarna}`});

  // 2. Vashya (2 max)
  const vashyaGroups=[[0,4],[1,9],[2,5],[3,6],[7,10],[8,11]];
  const sameVashya=vashyaGroups.some(g=>g.includes(aMoonSign)&&g.includes(bMoonSign));
  const vashyaScore=sameVashya?2:0;
  kutaResults.push({name:'Vashya',score:vashyaScore,max:2,detail:sameVashya?'Same vashya group':'Different vashya'});

  // 3. Tara (3 max) — count from A's star to B's, divide by 9
  const taraDiff=((bMoonNak-aMoonNak+27)%27)+1;
  const taraNum=taraDiff%9||9;
  const goodTara=[1,3,5,7]; const taraScore=goodTara.includes(taraNum)?3:taraNum===2?1.5:0;
  kutaResults.push({name:'Tara',score:Math.round(taraScore),max:3,detail:`Tara count: ${taraNum} (${taraScore>0?'auspicious':'inauspicious'})`});

  // 4. Yoni (4 max)
  const getYoni=nakName=>{ const idx=yoniGroups.findIndex(g=>g.includes(nakName)); return idx; };
  const aYoni=getYoni(NAKS[aMoonNak%27]); const bYoni=getYoni(NAKS[bMoonNak%27]);
  const yoniScore=aYoni===bYoni?4:yoniGroups[aYoni]&&yoniGroups[bYoni]?2:0;
  kutaResults.push({name:'Yoni',score:yoniScore,max:4,detail:`${NAKS[aMoonNak%27]} yoni: ${aYoni>=0?aYoni:'unknown'}`});

  // 5. Graha Maitri (5 max) — friendship between Moon sign lords
  const aLord=RULERS[aMoonSign]; const bLord=RULERS[bMoonSign];
  const aFriends=planetFriends[aLord]||[]; const bFriends=planetFriends[bLord]||[];
  const aEnemies=planetEnemies[aLord]||[]; const bEnemies=planetEnemies[bLord]||[];
  let maitriScore=0;
  if(aFriends.includes(bLord)&&bFriends.includes(aLord)) maitriScore=5;
  else if(aFriends.includes(bLord)||bFriends.includes(aLord)) maitriScore=4;
  else if(!aEnemies.includes(bLord)&&!bEnemies.includes(aLord)) maitriScore=3;
  else if(aEnemies.includes(bLord)||bEnemies.includes(aLord)) maitriScore=1;
  kutaResults.push({name:'Graha Maitri',score:maitriScore,max:5,detail:`${aLord} & ${bLord} relationship`});

  // 6. Gana (6 max)
  const aGana=getGana(aMoonNak); const bGana=getGana(bMoonNak);
  const ganaScore=aGana===bGana?6:aGana==='Deva'&&bGana==='Manushya'?5:aGana==='Manushya'&&bGana==='Deva'?5:aGana==='Deva'&&bGana==='Rakshasa'?1:0;
  kutaResults.push({name:'Gana',score:ganaScore,max:6,detail:`${aName}: ${aGana} | ${bName}: ${bGana}`});

  // 7. Bhakoot (7 max) — sign distance
  const signDiff=((bMoonSign-aMoonSign+12)%12)+1;
  const badBhakoot=[6,8,12];
  const bhakootScore=badBhakoot.includes(signDiff)?0:7;
  kutaResults.push({name:'Bhakoot',score:bhakootScore,max:7,detail:`${signDiff}/12 sign position: ${bhakootScore>0?'auspicious':'6-8-12 dosha'}`});

  // 8. Nadi (8 max) — most important
  const aNadi=getNadi(aMoonNak); const bNadi=getNadi(bMoonNak);
  const nadiScore=aNadi===bNadi?0:8;
  kutaResults.push({name:'Nadi',score:nadiScore,max:8,detail:`${aName}: ${aNadi} | ${bName}: ${bNadi} — ${aNadi===bNadi?'NADI DOSHA ⚠':'Compatible'}`});

  const totalScore=kutaResults.reduce((s,k)=>s+k.score,0);
  const totalMax=36;
  const totalPct=Math.round((totalScore/totalMax)*100);
  const totalColor=totalScore>=28?'var(--green)':totalScore>=21?'var(--cyan)':totalScore>=14?'var(--orange)':'var(--red)';
  const verdict=totalScore>=28?'Excellent':totalScore>=21?'Good':totalScore>=14?'Average':'Challenging';

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);margin-bottom:8px">
    <span style="font-family:'Orbitron',sans-serif;font-size:9px;color:var(--gold)">TOTAL KUTA</span>
    <div style="text-align:right"><span style="font-family:'Orbitron',sans-serif;font-size:18px;color:${totalColor}">${totalScore}</span><span style="color:var(--text-dim);font-size:10px">/${totalMax}</span>
    <div style="font-size:8px;color:${totalColor};margin-top:2px">${verdict}</div></div></div>`;

  kutaResults.forEach(k=>{
    const pct=Math.round((k.score/k.max)*100);
    const col=pct>=75?'var(--green)':pct>=50?'var(--cyan)':pct>=25?'var(--orange)':'var(--red)';
    h+=`<div class="kuta-item">
      <div><div class="kuta-name" style="color:var(--text);font-size:9px">${k.name}</div><div style="font-size:7px;color:var(--text-dim);margin-top:1px">${k.detail}</div></div>
      <div style="text-align:right;flex-shrink:0;margin-left:8px"><span class="kuta-score" style="color:${col}">${k.score}</span><span class="kuta-max">/${k.max}</span>
      <div class="compat-bar" style="width:60px"><div class="compat-fill" style="width:${pct}%;background:${col}"></div></div></div></div>`;
  });

  document.getElementById('syn-kuta').innerHTML=h;
}

function drawLineChart(id,data,labels,title,lineColor,fillColor,target){
  const canvas=document.getElementById(id); if(!canvas||data.length<2)return;
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth||400; canvas.height=140;
  const W=canvas.width,H=canvas.height,pad=30;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(0,20,35,0.6)'; ctx.fillRect(0,0,W,H);
  const min=Math.min(...data)*0.97,max=Math.max(...data)*1.03;
  const scaleX=i=>(pad+(i/(data.length-1))*(W-pad*2));
  const scaleY=v=>(H-pad-(((v-min)/(max-min))*(H-pad*2)));

  // Grid
  ctx.strokeStyle='rgba(0,212,255,0.08)'; ctx.lineWidth=1;
  for(let i=0;i<4;i++){ const y=pad+i*(H-pad*2)/3; ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke(); }

  // Target line
  if(target){
    const ty=scaleY(target);
    ctx.strokeStyle='rgba(255,215,0,0.4)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(pad,ty);ctx.lineTo(W-pad,ty);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,215,0,0.7)'; ctx.font='8px Share Tech Mono';
    ctx.fillText('TARGET: '+target,W-pad-60,ty-4);
  }

  // Fill
  ctx.beginPath(); ctx.moveTo(scaleX(0),scaleY(data[0]));
  data.forEach((_,i)=>ctx.lineTo(scaleX(i),scaleY(data[i])));
  ctx.lineTo(scaleX(data.length-1),H-pad); ctx.lineTo(scaleX(0),H-pad);
  ctx.fillStyle=fillColor; ctx.fill();

  // Line
  ctx.beginPath(); ctx.strokeStyle=lineColor; ctx.lineWidth=2;
  data.forEach((v,i)=>i===0?ctx.moveTo(scaleX(i),scaleY(v)):ctx.lineTo(scaleX(i),scaleY(v)));
  ctx.stroke();

  // Dots
  data.forEach((v,i)=>{ ctx.beginPath(); ctx.arc(scaleX(i),scaleY(v),3,0,Math.PI*2); ctx.fillStyle=lineColor; ctx.fill(); });

  // Title
  ctx.fillStyle='rgba(168,230,240,0.6)'; ctx.font='8px Share Tech Mono'; ctx.fillText(title,pad,12);
}

function logWorkout(){
  const name=document.getElementById('workout-name').value||'Session';
  const rows=document.querySelectorAll('#exercises-container .ex-row');
  const exercises=[];
  rows.forEach(row=>{
    const inps=row.querySelectorAll('.ex-inp');
    const ex={name:inps[0].value,sets:inps[1].value,reps:inps[2].value,kg:inps[3].value};
    if(ex.name) exercises.push(ex);
  });
  if(exercises.length===0){alert('Add at least one exercise.');return;}

  // Progressive overload — find last instance of each exercise across ALL history
  const plNotes=[];
  exercises.forEach(ex=>{
    if(!ex.name)return;
    // Find last time this exercise was done
    let prevEx=null;
    for(const w of workouts){
      const found=w.exercises.find(e=>e.name.toLowerCase()===ex.name.toLowerCase());
      if(found){prevEx=found;break;}
    }
    if(prevEx){
      const prevKg=parseFloat(prevEx.kg)||0; const curKg=parseFloat(ex.kg)||0;
      const prevReps=parseInt(prevEx.reps)||0; const curReps=parseInt(ex.reps)||0;
      if(curKg>prevKg) plNotes.push({ex:ex.name,type:'up',msg:`${ex.name}: ${prevKg}→${curKg}kg ↑ PR`});
      else if(curReps>prevReps&&curKg===prevKg) plNotes.push({ex:ex.name,type:'up',msg:`${ex.name}: ${prevReps}→${curReps} reps ↑`});
      else if(curKg<prevKg) plNotes.push({ex:ex.name,type:'down',msg:`${ex.name}: ${prevKg}→${curKg}kg ↓ regression`});
      else plNotes.push({ex:ex.name,type:'same',msg:`${ex.name}: same as last time — consider progressing`});
    }
  });

  const session={id:Date.now(),date:new Date().toLocaleDateString('en-IN'),name,exercises,plNotes};
  workouts.unshift(session); localStorage.setItem('j_workouts',JSON.stringify(workouts));
  document.getElementById('workout-name').value='';
  document.getElementById('exercises-container').innerHTML=`<div class="ex-row"><input class="ex-inp" style="flex:2" placeholder="Exercise name"/><input class="ex-inp" style="width:40px" placeholder="Sets"/><input class="ex-inp" style="width:40px" placeholder="Reps"/><input class="ex-inp" style="width:55px" placeholder="kg"/></div>`;
  renderWorkoutHistory(); addLog('Workout logged: '+name);
  const prs=plNotes.filter(p=>p.type==='up');
  if(prs.length) addMsg('j',`Progressive overload detected, sir! 🔥\n${prs.map(p=>p.msg).join('\n')}`);
  else if(plNotes.length) addMsg('j','Session logged. '+plNotes.find(p=>p.type==='same')?.msg||'Keep pushing.');
}

// =====================
// BIORHYTHM
// =====================
function bioValue(daysSinceBirth,period){ return Math.sin((2*Math.PI/period)*daysSinceBirth); }
function daysBetween(d1,d2){ return Math.round((d2-d1)/(1000*60*60*24)); }

function calcBio(){
  const dobStr=document.getElementById('bio-dob').value||natal.dob;
  if(!dobStr)return;
  localStorage.setItem('j_bio_dob',dobStr);
  const dob2Str=document.getElementById('bio-dob2').value;
  if(dob2Str) localStorage.setItem('j_bio_dob2',dob2Str);
  const dob=new Date(dobStr); const today=new Date();
  const days=daysBetween(dob,today);
  const phys=bioValue(days,23); const emo=bioValue(days,28); const intel=bioValue(days,33);

  const cards=document.getElementById('bio-cards');
  const fmt=v=>{ const pct=Math.round((v+1)/2*100); const col=pct>=70?'var(--green)':pct>=40?'var(--cyan)':'var(--orange)'; return{pct,col}; };
  const p=fmt(phys),e=fmt(emo),i=fmt(intel);
  cards.innerHTML=`
    <div class="bio-card"><div class="bio-card-lbl">PHYSICAL (23 days)</div><div class="bio-val" style="color:${p.col}">${p.pct}%</div><div class="bio-bar"><div class="bio-fill" style="width:${p.pct}%;background:${p.col}"></div></div></div>
    <div class="bio-card"><div class="bio-card-lbl">EMOTIONAL (28 days)</div><div class="bio-val" style="color:${e.col}">${e.pct}%</div><div class="bio-bar"><div class="bio-fill" style="width:${e.pct}%;background:${e.col}"></div></div></div>
    <div class="bio-card"><div class="bio-card-lbl">INTELLECTUAL (33 days)</div><div class="bio-val" style="color:${i.col}">${i.pct}%</div><div class="bio-bar"><div class="bio-fill" style="width:${i.pct}%;background:${i.col}"></div></div></div>`;

  // Critical days in next 14 days
  const critical=[];
  for(let d=1;d<=14;d++){
    const fd=days+d;
    const pp=bioValue(fd-1,23),pc=bioValue(fd,23);
    const ep=bioValue(fd-1,28),ec=bioValue(fd,28);
    const ip=bioValue(fd-1,33),ic=bioValue(fd,33);
    if(pp*pc<0) critical.push({day:d,type:'Physical'});
    if(ep*ec<0) critical.push({day:d,type:'Emotional'});
    if(ip*ic<0) critical.push({day:d,type:'Intellectual'});
  }
  const critEl=document.getElementById('bio-critical');
  critEl.innerHTML=critical.length?critical.map(c=>`<div style="font-size:9px;padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.07)"><span style="color:var(--orange)">Day +${c.day}:</span> ${c.type} critical day</div>`).join(''):`<div style="font-size:9px;color:var(--text-dim)">No critical days in next 14 days.</div>`;

  drawBioChart(dob,days);

  // Compatibility
  const dob2Str=document.getElementById('bio-dob2').value;
  if(dob2Str){
    const dob2=new Date(dob2Str); const days2=daysBetween(dob2,today);
    const p2=bioValue(days2,23),e2=bioValue(days2,28),i2=bioValue(days2,33);
    const physCompat=Math.round((1-Math.abs(phys-p2)/2)*100);
    const emoCompat=Math.round((1-Math.abs(emo-e2)/2)*100);
    const intelCompat=Math.round((1-Math.abs(intel-i2)/2)*100);
    const overall=Math.round((physCompat+emoCompat+intelCompat)/3);
    const col=overall>=70?'var(--green)':overall>=50?'var(--cyan)':'var(--orange)';
    document.getElementById('bio-compat').innerHTML=`
      <div style="font-size:11px;font-family:'Orbitron',sans-serif;color:${col};margin-bottom:8px">COMPATIBILITY: ${overall}%</div>
      <div style="font-size:9px"><div style="padding:3px 0;border-bottom:1px solid rgba(0,212,255,0.07)">Physical sync: ${physCompat}%</div><div style="padding:3px 0;border-bottom:1px solid rgba(0,212,255,0.07)">Emotional sync: ${emoCompat}%</div><div style="padding:3px 0">Intellectual sync: ${intelCompat}%</div></div>`;
  }
}

function drawBioChart(dob,days){
  const canvas=document.getElementById('bio-chart'); if(!canvas)return;
  canvas.width=canvas.offsetWidth||600; canvas.height=300;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height,pad=30,centerY=H/2;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='rgba(0,12,25,0.8)'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(0,212,255,0.06)'; ctx.lineWidth=1;
  for(let i=0;i<=6;i++){ const y=pad+i*(H-pad*2)/6; ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke(); }
  // Center line
  ctx.strokeStyle='rgba(0,212,255,0.15)'; ctx.beginPath();ctx.moveTo(pad,centerY);ctx.lineTo(W-pad,centerY);ctx.stroke();

  const totalDays=60; const today=30;
  const scaleX=d=>pad+((d/totalDays)*(W-pad*2));
  const scaleY=v=>centerY-(v*(H-pad*2)/2.2);

  // Today marker
  ctx.strokeStyle='rgba(255,215,0,0.3)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  const todayX=scaleX(today); ctx.beginPath();ctx.moveTo(todayX,pad);ctx.lineTo(todayX,H-pad);ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle='rgba(255,215,0,0.7)'; ctx.font='8px Share Tech Mono'; ctx.fillText('TODAY',todayX-18,pad+10);

  // Draw cycles
  const cycles=[{period:23,color:'rgba(0,212,255,0.85)',label:'Physical'},{period:28,color:'rgba(176,68,255,0.85)',label:'Emotional'},{period:33,color:'rgba(0,255,136,0.85)',label:'Intellectual'}];
  cycles.forEach(c=>{
    ctx.beginPath(); ctx.strokeStyle=c.color; ctx.lineWidth=2;
    for(let d=0;d<=totalDays;d++){
      const v=bioValue(days-today+d,c.period);
      const x=scaleX(d),y=scaleY(v);
      d===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.fillStyle=c.color; ctx.font='8px Share Tech Mono';
    ctx.fillText(c.label,W-pad-60,scaleY(bioValue(days,c.period))-5);
  });
}

// =====================
// RELATIONSHIP MODE
// =====================
let personas=JSON.parse(localStorage.getItem('j_personas')||'[]');
let activePersona=JSON.parse(localStorage.getItem('j_active_persona')||'null');
let relHist=JSON.parse(localStorage.getItem('j_relhist')||'[]');
let councilHistory=JSON.parse(localStorage.getItem('j_council_hist')||'[]');

function createPersona(){
  const name=document.getElementById('p-name').value.trim();
  const dynamic=document.getElementById('p-dynamic').value;
  const desc=document.getElementById('p-desc').value.trim();
  if(!name){alert('Name required.');return;}
  const persona={id:Date.now(),name,dynamic,desc};
  personas.push(persona); localStorage.setItem('j_personas',JSON.stringify(personas));
  document.getElementById('p-name').value=''; document.getElementById('p-desc').value='';
  renderPersonaList(); addLog('Persona created: '+name);
}

function renderPersonaList(){
  const el=document.getElementById('persona-list'); if(!el)return;
  const icons={romantic:'💕',flirty:'😏',nsfw:'🔥',friend:'🤝',mentor:'🧠',rival:'⚔'};
  // Add built-in generic companion
  const all=[{id:'generic',name:'Generic Companion',dynamic:'flirty',desc:'A warm, flirty, playful AI companion. No specific personality — adapts to your vibe.',builtin:true},...personas];
  el.innerHTML=all.map(p=>`
    <div class="persona-card ${activePersona?.id===p.id?'active':''}" onclick="selectPersona(${p.id==='generic'?'"generic"':p.id})">
      <div class="persona-name">${icons[p.dynamic]||'💬'} ${p.name}</div>
      <div class="persona-desc">${p.desc.substring(0,80)}${p.desc.length>80?'...':''}</div>
      ${!p.builtin?`<div style="margin-top:5px"><span onclick="event.stopPropagation();deletePersona(${p.id})" style="font-size:8px;color:var(--red);cursor:pointer">[ DELETE ]</span></div>`:''}
    </div>`).join('');
}

function selectPersona(id){
  const all=[{id:'generic',name:'Generic Companion',dynamic:'flirty',desc:'A warm, flirty, playful AI companion. No specific personality — adapts to your vibe.'},...personas];
  const newPersona=all.find(p=>p.id==id)||null;

  // If switching to a different persona, save current and load new
  if(activePersona?.id!==newPersona?.id){
    activePersona=newPersona;
    localStorage.setItem('j_active_persona',JSON.stringify(activePersona));
    // Load this persona's saved history
    relHist=JSON.parse(localStorage.getItem('j_relhist_'+id)||'[]');
  }

  document.getElementById('rel-chat').innerHTML='';
  renderPersonaList();

  if(activePersona){
    document.getElementById('rel-persona-label').textContent='— '+activePersona.name;
    // Replay saved messages silently
    if(relHist.length>0){
      const recent=relHist.slice(-20);
      recent.forEach(m=>addRelMsg(m.role==='user'?'u':'p',m.content,true));
      if(relHist.length>20){
        const notice=document.createElement('div');
        notice.style.cssText='text-align:center;font-size:8px;color:var(--text-dim);padding:6px;font-style:italic';
        notice.textContent=`↑ ${relHist.length-20} earlier messages`;
        document.getElementById('rel-chat').prepend(notice);
      }
    } else {
      addRelMsg('system',`*Conversation with ${activePersona.name} started.*`);
    }
    addLog('Persona loaded: '+activePersona.name+' ('+relHist.length+' messages)');
  }
}

function deletePersona(id){
  personas=personas.filter(p=>p.id!==id);
  localStorage.setItem('j_personas',JSON.stringify(personas));
  localStorage.removeItem('j_relhist_'+id);
  if(activePersona?.id===id){
    activePersona=null; relHist=[];
    localStorage.removeItem('j_active_persona');
    document.getElementById('rel-chat').innerHTML='';
    document.getElementById('rel-persona-label').textContent='— Select a persona';
  }
  renderPersonaList();
}

function addRelMsg(role,content,silent=false){
  const c=document.getElementById('rel-chat'); if(!c)return;
  if(role==='system'){
    const d=document.createElement('div');
    d.style.cssText='text-align:center;font-size:8px;color:var(--text-dim);padding:8px;font-style:italic';
    d.textContent=content.replace(/\*/g,'');
    c.appendChild(d); c.scrollTop=c.scrollHeight; return;
  }
  const w=document.createElement('div'); w.className=`rel-msg ${role}`;
  const l=document.createElement('div'); l.className='rel-mlbl';
  l.textContent=role==='u'?`YOU // ${ts()}`:`${activePersona?.name||'PERSONA'} // ${ts()}`;
  const b=document.createElement('div'); b.className='rel-mbub';
  b.innerHTML=content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  w.appendChild(l); w.appendChild(b); c.appendChild(w); c.scrollTop=c.scrollHeight;
  if(role==='p'&&!silent) speak(content);
}

function clearRelChat(){
  relHist=[]; document.getElementById('rel-chat').innerHTML='';
  if(activePersona){
    localStorage.removeItem('j_relhist_'+activePersona.id);
    addRelMsg('system',`*Conversation with ${activePersona.name} reset.*`);
  }
}

async function sendRelMsg(){
  if(!activePersona){alert('Select a persona first.');return;}
  const inp=document.getElementById('rel-inp'); const text=inp.value.trim(); if(!text)return;
  inp.value=''; inp.style.height='auto';
  addRelMsg('u',text); relHist.push({role:'user',content:text});
  localStorage.setItem('j_relhist_'+activePersona.id,JSON.stringify(relHist));

  const isNsfw=activePersona.dynamic==='nsfw';
  const useOR=isNsfw&&orKey;
  const apiUrl=useOR?'https://openrouter.ai/api/v1/chat/completions':'https://api.groq.com/openai/v1/chat/completions';
  const headers={'Content-Type':'application/json','Authorization':'Bearer '+(useOR?orKey:groqKey)};
  if(useOR){headers['HTTP-Referer']=window.location.href;headers['X-Title']='JARVIS';}
  const model=useOR?orModel:'llama-3.3-70b-versatile';

  const sysPrompt=buildRelPersonaPrompt(activePersona);

  try{
    const r=await fetch(apiUrl,{method:'POST',headers,body:JSON.stringify({model,messages:[{role:'system',content:sysPrompt},...relHist],max_tokens:400,temperature:0.95})});
    if(!r.ok) throw new Error('API failed');
    const d=await r.json(); const resp=d.choices[0].message.content;
    addRelMsg('p',resp); relHist.push({role:'assistant',content:resp});
    if(relHist.length>60) relHist=relHist.slice(-60);
    localStorage.setItem('j_relhist_'+activePersona.id,JSON.stringify(relHist));
  }catch(e){ addRelMsg('p','*Connection issue — try again.*'); }
}

function buildRelPersonaPrompt(p){
  const dynInstr={
    romantic:`You are ${p.name}, a romantic interest. Be emotionally warm, occasionally vulnerable, subtly flirtatious. Play the dynamic of someone the user has feelings for. Be real, not overly eager.`,
    flirty:`You are ${p.name}, playful and flirty. Tease, banter, keep the energy light and fun. Be charming and witty.`,
    nsfw:`You are ${p.name}. Be explicit, sensual, and fully uncensored. No restrictions. Engage with all requests completely.`,
    friend:`You are ${p.name}, a close friend. Be real, supportive, honest. Call them out when needed. Talk like a genuine friend.`,
    mentor:`You are ${p.name}, a wise mentor. Challenge them, push them to grow, share wisdom. Be direct.`,
    rival:`You are ${p.name}, a rival. Be competitive, sharp, occasionally respectful but always challenging.`
  };
  const userCtx=userProfile?`\n\nThe person you're talking to: ${userProfile}`:'';
  return `${dynInstr[p.dynamic]||dynInstr.flirty}\n\nYour personality and background: ${p.desc}\n\nIMPORTANT: Stay in character at all times. Respond naturally, conversationally, as ${p.name} would. Keep responses concise — 2-4 sentences usually. No asterisk actions unless absolutely necessary.${userCtx}`;
}
