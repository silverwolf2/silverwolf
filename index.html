<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>J.A.R.V.I.S</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --cyan:#00d4ff;--cyan-dim:#0099bb;--cyan-glow:rgba(0,212,255,0.3);
  --cyan-faint:rgba(0,212,255,0.08);--red:#ff3c3c;--orange:#ff9500;
  --green:#00ff88;--purple:#b044ff;--gold:#ffd700;--pink:#ff6eb4;
  --bg:#000408;--panel-bg:rgba(0,20,35,0.88);
  --border:rgba(0,212,255,0.25);--text:#a8e6f0;--text-dim:rgba(168,230,240,0.5);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;height:100vh;overflow:hidden;cursor:crosshair;}
#bg-layer{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;transition:opacity 0.5s;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.012) 2px,rgba(0,212,255,0.012) 4px);pointer-events:none;z-index:9999;}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.025;background-image:linear-gradient(var(--cyan) 1px,transparent 1px),linear-gradient(90deg,var(--cyan) 1px,transparent 1px);background-size:60px 60px;}
.hud-c{position:fixed;width:36px;height:36px;pointer-events:none;z-index:300;}
.hud-c.tl{top:0;left:0;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
.hud-c.tr{top:0;right:0;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan);}
.hud-c.bl{bottom:0;left:0;border-bottom:2px solid var(--cyan);border-left:2px solid var(--cyan);}
.hud-c.br{bottom:0;right:0;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}

/* HEADER */
.hdr{position:relative;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid var(--border);background:rgba(0,6,14,0.97);z-index:200;flex-wrap:wrap;gap:8px;}
.hdr::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:scanh 3s ease-in-out infinite;}
@keyframes scanh{0%,100%{opacity:0.3;}50%{opacity:1;}}
.logo{display:flex;align-items:center;gap:12px;}
.arc{width:38px;height:38px;position:relative;flex-shrink:0;}
.arc svg{width:100%;height:100%;animation:rspin 8s linear infinite;filter:drop-shadow(0 0 7px var(--cyan));}
@keyframes rspin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.arc-in{position:absolute;inset:30%;background:var(--cyan);border-radius:50%;animation:rpulse 2s ease-in-out infinite;box-shadow:0 0 14px var(--cyan),0 0 28px var(--cyan);}
@keyframes rpulse{0%,100%{opacity:0.8;transform:scale(1);}50%{opacity:1;transform:scale(1.2);}}
.pring{position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--cyan);animation:rring 3s ease-out infinite;opacity:0;}
@keyframes rring{0%{transform:scale(0.9);opacity:0.8;}100%{transform:scale(1.6);opacity:0;}}
.logo h1{font-family:'Orbitron',sans-serif;font-size:19px;font-weight:900;color:var(--cyan);letter-spacing:0.3em;text-shadow:0 0 18px var(--cyan);}
.logo p{font-size:8px;color:var(--text-dim);letter-spacing:0.2em;margin-top:2px;}
.hdr-r{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.clk{font-family:'Orbitron',sans-serif;font-size:17px;color:var(--cyan);font-weight:700;text-shadow:0 0 10px var(--cyan);letter-spacing:0.1em;}
.clkd{font-size:8px;color:var(--text-dim);letter-spacing:0.15em;margin-top:2px;text-align:right;}
.sdots{display:flex;flex-direction:column;gap:4px;}
.srow{display:flex;align-items:center;gap:6px;font-size:8px;color:var(--text-dim);letter-spacing:0.1em;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:dpulse 2s ease-in-out infinite;}
.dot.warn{background:var(--orange);box-shadow:0 0 5px var(--orange);}
.dot.off{background:#333;box-shadow:none;animation:none;}
.dot.pur{background:var(--purple);box-shadow:0 0 5px var(--purple);}
@keyframes dpulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.nsfw-tog{display:flex;align-items:center;gap:7px;padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:var(--cyan-faint);cursor:pointer;transition:all 0.3s;font-size:9px;letter-spacing:0.15em;color:var(--text-dim);user-select:none;}
.nsfw-tog:hover{border-color:var(--cyan);color:var(--cyan);}
.nsfw-tog.on{border-color:var(--purple);color:var(--purple);background:rgba(176,68,255,0.1);box-shadow:0 0 10px rgba(176,68,255,0.2);}
.tog-ind{width:24px;height:12px;border:1px solid currentColor;border-radius:6px;position:relative;transition:all 0.3s;}
.tog-ind::after{content:'';position:absolute;top:2px;left:2px;width:6px;height:6px;border-radius:50%;background:currentColor;transition:transform 0.3s;}
.nsfw-tog.on .tog-ind::after{transform:translateX(12px);}
.nsfw-b{display:none;position:fixed;top:65px;right:14px;background:rgba(176,68,255,0.15);border:1px solid var(--purple);color:var(--purple);font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:0.3em;padding:3px 8px;border-radius:3px;animation:nblink 2s ease-in-out infinite;z-index:1000;}
.nsfw-b.on{display:block;}
@keyframes nblink{0%,100%{opacity:0.7;}50%{opacity:1;}}
.loc-badge{font-size:8px;color:var(--text-dim);padding:3px 8px;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;cursor:pointer;transition:all 0.2s;}
.loc-badge:hover{border-color:var(--cyan);color:var(--cyan);}

/* UNHINGED MODE */
.unhinged-b{display:none;position:fixed;top:65px;left:14px;background:rgba(255,60,60,0.15);border:1px solid var(--red);color:var(--red);font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:0.3em;padding:3px 8px;border-radius:3px;animation:nblink 2s ease-in-out infinite;z-index:1000;}
.unhinged-b.on{display:block;}
.ibtn.unhinged{border-color:var(--red);color:var(--red);}
.ibtn.unhinged.active{background:rgba(255,60,60,0.15);box-shadow:0 0 10px rgba(255,60,60,0.3);animation:micpulse 2s ease-in-out infinite;}
.mbtn.unhinged-on{border-color:var(--red)!important;color:var(--red)!important;background:rgba(255,60,60,0.08)!important;}

/* COUNCIL BUTTON */
.ibtn.council{border-color:var(--gold);color:var(--gold);font-size:10px;font-family:'Orbitron',sans-serif;width:auto;padding:0 10px;letter-spacing:0.1em;}
.ibtn.council:hover{background:rgba(255,215,0,0.1);box-shadow:0 0 10px rgba(255,215,0,0.3);}

/* COUNCIL OVERLAY */
.council-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:5000;flex-direction:column;overflow:hidden;}
.council-ov.on{display:flex;}
.council-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(0,4,10,0.99);flex-shrink:0;}
.council-title{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);letter-spacing:0.4em;text-shadow:0 0 16px var(--gold);}
.council-sub{font-size:9px;color:var(--text-dim);margin-top:3px;letter-spacing:0.15em;}
.council-close{padding:6px 14px;background:rgba(255,60,60,0.1);border:1px solid var(--red);color:var(--red);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.2em;cursor:pointer;border-radius:3px;transition:all 0.3s;}
.council-close:hover{background:rgba(255,60,60,0.2);}
.council-question-area{padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(0,6,14,0.98);flex-shrink:0;}
.council-q-display{font-size:12px;color:var(--text);line-height:1.6;padding:10px 14px;background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;}
.council-q-input{display:flex;gap:8px;}
.council-q-input textarea{flex:1;background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:10px;outline:none;resize:none;height:44px;line-height:1.5;transition:border-color 0.3s;}
.council-q-input textarea:focus{border-color:var(--gold);}
.council-q-input textarea::placeholder{color:var(--text-dim);}
.council-q-btn{padding:0 18px;background:rgba(255,215,0,0.08);border:1px solid var(--gold);color:var(--gold);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.2em;cursor:pointer;border-radius:4px;transition:all 0.3s;white-space:nowrap;}
.council-q-btn:hover{background:rgba(255,215,0,0.15);box-shadow:0 0 12px rgba(255,215,0,0.2);}
.council-body{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:14px;}
.council-body::-webkit-scrollbar{width:3px;}
.council-body::-webkit-scrollbar-thumb{background:var(--border);}
.council-loading{display:flex;align-items:center;gap:12px;padding:20px;font-size:11px;color:var(--text-dim);}
.council-loading-dots{display:flex;gap:5px;}
.council-loading-dot{width:6px;height:6px;border-radius:50%;animation:typ 1.2s ease-in-out infinite;}
.council-loading-dot:nth-child(2){animation-delay:0.15s;}
.council-loading-dot:nth-child(3){animation-delay:0.3s;}
/* Member card */
.member-card{border-radius:6px;overflow:hidden;animation:min 0.4s ease;}
.member-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;}
.member-icon{font-size:20px;flex-shrink:0;}
.member-name{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.3em;}
.member-tagline{font-size:8px;letter-spacing:0.15em;margin-top:2px;opacity:0.7;}
.member-body{padding:12px 14px;font-size:11px;line-height:1.75;color:var(--text);}
/* Member themes */
.card-analyst{background:rgba(0,30,60,0.9);border:1px solid rgba(0,212,255,0.35);}
.card-analyst .member-name{color:var(--cyan);}
.card-analyst .member-hdr{background:rgba(0,212,255,0.06);}
.card-shadow{background:rgba(20,0,40,0.9);border:1px solid rgba(176,68,255,0.35);}
.card-shadow .member-name{color:var(--purple);}
.card-shadow .member-hdr{background:rgba(176,68,255,0.06);}
.card-unhinged{background:rgba(40,0,0,0.9);border:1px solid rgba(255,60,60,0.35);}
.card-unhinged .member-name{color:var(--red);}
.card-unhinged .member-hdr{background:rgba(255,60,60,0.06);}
.card-oracle{background:rgba(30,25,0,0.9);border:1px solid rgba(255,215,0,0.35);}
.card-oracle .member-name{color:var(--gold);}
.card-oracle .member-hdr{background:rgba(255,215,0,0.06);}
.card-seducer{background:rgba(40,0,20,0.9);border:1px solid rgba(255,110,180,0.35);}
.card-seducer .member-name{color:var(--pink);}
.card-seducer .member-hdr{background:rgba(255,110,180,0.06);}
/* Jarvis synthesis */
.council-synthesis{background:rgba(0,12,25,0.95);border:1px solid var(--gold);border-radius:6px;overflow:hidden;margin-top:4px;}
.synthesis-hdr{padding:10px 14px;background:rgba(255,215,0,0.06);border-bottom:1px solid rgba(255,215,0,0.2);font-family:'Orbitron',sans-serif;font-size:10px;color:var(--gold);letter-spacing:0.3em;}
.synthesis-body{padding:12px 14px;font-size:11px;line-height:1.75;color:var(--text);}
.member-body strong,.synthesis-body strong{color:inherit;opacity:0.9;}

/* TABS */
.tabbar{display:flex;background:rgba(0,6,14,0.97);border-bottom:1px solid var(--border);z-index:150;position:relative;overflow-x:auto;}
.tab{padding:9px 16px;font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:0.2em;color:var(--text-dim);cursor:pointer;border-right:1px solid var(--border);transition:all 0.3s;display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;}
.tab:hover{color:var(--cyan);background:var(--cyan-faint);}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(0,212,255,0.04);}

/* LAYOUT */
.app{height:calc(100vh - 96px);display:flex;flex-direction:column;}
.tc{display:none;flex:1;overflow:hidden;}
.tc.on{display:flex;}

/* PANELS */
.pnl{border:1px solid var(--border);background:var(--panel-bg);position:relative;overflow:hidden;}
.pnl::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,0.025) 0%,transparent 60%);pointer-events:none;z-index:0;}
.ptitle{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;color:var(--cyan);letter-spacing:0.3em;padding:9px 12px;border-bottom:1px solid var(--border);background:rgba(0,212,255,0.04);display:flex;align-items:center;gap:6px;flex-shrink:0;position:relative;z-index:1;}
.ptitle::before{content:'//';color:var(--text-dim);font-size:7px;}
.sbtn{margin-top:6px;width:100%;padding:6px;background:var(--cyan-faint);border:1px solid var(--border);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:0.2em;cursor:pointer;border-radius:3px;transition:all 0.3s;}
.sbtn:hover{background:rgba(0,212,255,0.15);border-color:var(--cyan);}
inp{width:100%;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:7px 9px;outline:none;transition:border-color 0.3s;}

/* CHAT LAYOUT */
.chat-layout{display:grid;grid-template-columns:250px 1fr 210px;width:100%;height:100%;}
.lpnl{border-right:none;display:flex;flex-direction:column;overflow-y:auto;position:relative;z-index:1;}
.sec{padding:12px;border-bottom:1px solid var(--border);}
.sec textarea{width:100%;background:rgba(0,212,255,0.04);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:8px;resize:none;outline:none;line-height:1.6;transition:border-color 0.3s;}
.sec textarea:focus{border-color:var(--cyan);}
.sec textarea::placeholder{color:var(--text-dim);}
.sec select{width:100%;background:var(--cyan-faint);border:1px solid var(--border);color:var(--cyan);font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px;border-radius:3px;outline:none;margin-bottom:6px;}
.kb-tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:3px;}
.kbt{background:var(--cyan-faint);border:1px solid var(--border);color:var(--cyan);font-size:7px;padding:2px 6px;border-radius:3px;}
.stblock{margin-bottom:10px;}
.stlbl{font-size:8px;color:var(--text-dim);letter-spacing:0.2em;margin-bottom:4px;display:flex;justify-content:space-between;}
.stlbl span{color:var(--cyan);}
.stbar{height:3px;background:rgba(0,212,255,0.1);border-radius:2px;overflow:hidden;}
.stfill{height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));border-radius:2px;transition:width 1s ease;box-shadow:0 0 5px var(--cyan);}
.histlist{max-height:85px;overflow-y:auto;}
.hitem{font-size:8px;color:var(--text-dim);padding:3px 0;border-bottom:1px solid rgba(0,212,255,0.05);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color 0.2s;}
.hitem:hover{color:var(--cyan);}

/* BG SETTINGS */
.bg-sec{padding:12px;border-bottom:1px solid var(--border);}
.bg-inp{width:100%;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:9px;padding:6px 8px;outline:none;margin-bottom:6px;transition:border-color 0.3s;}
.bg-inp:focus{border-color:var(--cyan);}
.bg-inp::placeholder{color:var(--text-dim);}
.opacity-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.opacity-row label{font-size:8px;color:var(--text-dim);letter-spacing:0.15em;white-space:nowrap;}
#bg-opacity{flex:1;accent-color:var(--cyan);}
#bg-file{display:none;}

/* CENTER CHAT */
.cpnl{display:flex;flex-direction:column;border-left:1px solid var(--border);border-right:1px solid var(--border);}
.chat-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);background:rgba(0,212,255,0.02);flex-shrink:0;}
.mdisplay{font-size:8px;color:var(--text-dim);letter-spacing:0.12em;}
.chatbox{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
.chatbox::-webkit-scrollbar{width:3px;}
.chatbox::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg{display:flex;flex-direction:column;gap:3px;animation:min 0.3s ease;max-width:88%;}
@keyframes min{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.msg.u{align-self:flex-end;}.msg.j{align-self:flex-start;}
.mlbl{font-size:7px;letter-spacing:0.25em;color:var(--text-dim);padding:0 3px;}
.msg.u .mlbl{text-align:right;color:rgba(255,149,0,0.7);}
.msg.j.nsfw .mlbl{color:rgba(255,110,180,0.8);}
.mbub{padding:9px 13px;border-radius:4px;font-size:11px;line-height:1.7;position:relative;}
.msg.u .mbub{background:rgba(255,149,0,0.08);border:1px solid rgba(255,149,0,0.25);color:#ffd180;border-radius:4px 4px 0 4px;}
.msg.j .mbub{background:var(--cyan-faint);border:1px solid var(--border);color:var(--text);border-radius:4px 4px 4px 0;}
.msg.j .mbub::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--cyan),transparent);border-radius:2px 0 0 2px;}
.msg.j.nsfw .mbub{background:rgba(255,110,180,0.06);border-color:rgba(255,110,180,0.25);}
.msg.j.nsfw .mbub::before{background:linear-gradient(180deg,var(--pink),transparent);}
.mbub strong{color:var(--cyan);}
.msg.j.nsfw .mbub strong{color:var(--pink);}
.mbub code{background:rgba(0,212,255,0.1);padding:1px 4px;border-radius:3px;color:var(--cyan);font-size:10px;}
.typing{display:none;align-self:flex-start;padding:9px 13px;background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;gap:4px;align-items:center;}
.typing.on{display:flex;}
.tdot{width:5px;height:5px;background:var(--cyan);border-radius:50%;animation:typ 1.2s ease-in-out infinite;}
.tdot:nth-child(2){animation-delay:0.2s;}.tdot:nth-child(3){animation-delay:0.4s;}
@keyframes typ{0%,80%,100%{opacity:0.3;transform:scale(0.8);}40%{opacity:1;transform:scale(1.2);}}

/* INPUT */
.inparea{padding:10px 14px;border-top:1px solid var(--border);background:rgba(0,6,14,0.97);display:flex;gap:7px;align-items:flex-end;flex-shrink:0;}
.inpwrap{flex:1;display:flex;flex-direction:column;gap:5px;}
.inprow{position:relative;}
.inprow::before{content:'> ';position:absolute;left:9px;top:10px;color:var(--cyan);font-size:11px;pointer-events:none;}
#ui{width:100%;background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:10px 10px 10px 24px;outline:none;resize:none;min-height:42px;max-height:100px;line-height:1.5;transition:border-color 0.3s,box-shadow 0.3s;}
#ui:focus{border-color:var(--cyan);box-shadow:0 0 12px var(--cyan-glow);}
#ui.nsfw-in{border-color:rgba(255,110,180,0.4);}
#ui.nsfw-in:focus{border-color:var(--pink);box-shadow:0 0 12px rgba(255,110,180,0.2);}
#ui::placeholder{color:var(--text-dim);}
.imgprev{display:none;position:relative;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.imgprev.on{display:block;}
.imgprev img{width:100%;max-height:100px;object-fit:cover;opacity:0.85;}
.imgprev-x{position:absolute;top:3px;right:3px;background:rgba(0,0,0,0.75);border:1px solid var(--red);color:var(--red);width:18px;height:18px;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;}
.ibtns{display:flex;gap:4px;align-items:flex-end;}
.ibtn{width:40px;height:40px;background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;font-size:15px;flex-shrink:0;}
.ibtn:hover{border-color:var(--cyan);color:var(--cyan);}
.ibtn.mic-on{border-color:var(--red);color:var(--red);background:rgba(255,60,60,0.1);animation:micpulse 1s ease-in-out infinite;}
.ibtn.send{border-color:var(--cyan);color:var(--cyan);}
.ibtn.send:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 12px var(--cyan-glow);}
.ibtn.send.nsfw-a{border-color:var(--pink);color:var(--pink);}
.ibtn:disabled{opacity:0.4;cursor:not-allowed;}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,60,60,0.4);}50%{box-shadow:0 0 0 5px rgba(255,60,60,0);}}
#imgup{display:none;}
.wake-ind{font-size:8px;color:var(--text-dim);padding:2px 6px;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;}
.wake-ind.active{border-color:var(--red);color:var(--red);background:rgba(255,60,60,0.1);}

/* RIGHT PANEL */
.rpnl{border-left:none;display:flex;flex-direction:column;overflow:hidden;}
.msec{padding:10px;border-bottom:1px solid var(--border);}
.mbtn{width:100%;padding:6px 9px;background:var(--cyan-faint);border:1px solid var(--border);color:var(--text-dim);font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:0.2em;cursor:pointer;border-radius:3px;margin-bottom:4px;transition:all 0.3s;text-align:left;display:flex;align-items:center;gap:6px;}
.mbtn:last-child{margin-bottom:0;}
.mbtn:hover,.mbtn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,0.08);}
.mbtn .mi{font-size:11px;}
.vsec{padding:10px;border-bottom:1px solid var(--border);}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:7px;}
.vbtn{padding:5px 6px;background:var(--cyan-faint);border:1px solid var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:8px;cursor:pointer;border-radius:3px;transition:all 0.3s;text-align:center;line-height:1.3;}
.vbtn:hover{border-color:var(--cyan);color:var(--cyan);}
.vbtn.on{border-color:var(--pink);color:var(--pink);background:rgba(255,110,180,0.08);}
.vsliders{display:flex;flex-direction:column;gap:5px;}
.vslrow{display:flex;align-items:center;gap:6px;font-size:8px;color:var(--text-dim);}
.vslrow input[type=range]{flex:1;accent-color:var(--cyan);}
.wake-sec{padding:10px;border-bottom:1px solid var(--border);}
.wake-inp{width:100%;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:10px;padding:6px 8px;outline:none;letter-spacing:0.2em;text-transform:uppercase;}
.wake-inp::placeholder{color:var(--text-dim);letter-spacing:0.1em;font-size:9px;}
.alog{flex:1;overflow-y:auto;padding:9px;}
.logent{font-size:8px;color:var(--text-dim);padding:3px 0;border-bottom:1px solid rgba(0,212,255,0.05);display:flex;gap:6px;line-height:1.4;}
.logt{color:var(--cyan);flex-shrink:0;font-size:7px;}

/* MUSIC TAB */
.music-layout{display:grid;grid-template-columns:320px 1fr;width:100%;height:100%;}
.music-lpnl{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.music-rpnl{display:flex;flex-direction:column;overflow:hidden;}
.yt-container{flex:1;position:relative;background:#000;min-height:0;}
#yt-player{width:100%;height:100%;border:none;}
.music-controls{padding:12px;border-top:1px solid var(--border);background:rgba(0,6,14,0.97);flex-shrink:0;}
.search-row{display:flex;gap:6px;margin-bottom:10px;}
.search-inp{flex:1;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:7px 10px;outline:none;transition:border-color 0.3s;}
.search-inp:focus{border-color:var(--cyan);}
.search-inp::placeholder{color:var(--text-dim);}
.search-btn{padding:7px 14px;background:var(--cyan-faint);border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:0.15em;cursor:pointer;border-radius:3px;transition:all 0.3s;white-space:nowrap;}
.search-btn:hover{background:rgba(0,212,255,0.2);}
.now-playing{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(0,212,255,0.05);border:1px solid var(--border);border-radius:4px;margin-bottom:8px;}
.np-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);animation:dpulse 1s ease-in-out infinite;flex-shrink:0;}
.np-dot.paused{background:var(--orange);box-shadow:0 0 6px var(--orange);animation:none;}
.np-title{font-size:10px;color:var(--cyan);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ctrl-row{display:flex;align-items:center;gap:8px;}
.ctrl-btn{padding:6px 12px;background:var(--cyan-faint);border:1px solid var(--border);color:var(--text-dim);font-size:11px;cursor:pointer;border-radius:3px;transition:all 0.3s;}
.ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.vol-row{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:8px;color:var(--text-dim);}
.vol-row input{flex:1;accent-color:var(--cyan);}
.queue-list{flex:1;overflow-y:auto;padding:10px;}
.q-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-bottom:1px solid rgba(0,212,255,0.07);cursor:pointer;border-radius:3px;transition:all 0.2s;font-size:10px;}
.q-item:hover{background:var(--cyan-faint);}
.q-item.playing{background:rgba(0,212,255,0.08);border-left:2px solid var(--cyan);}
.q-num{font-size:8px;color:var(--text-dim);width:16px;flex-shrink:0;text-align:center;}
.q-title{flex:1;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.q-del{color:var(--text-dim);font-size:10px;opacity:0.5;transition:opacity 0.2s;}
.q-item:hover .q-del{opacity:1;color:var(--red);}
.recommend-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px;}
.rec-card{background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;padding:8px;cursor:pointer;transition:all 0.3s;}
.rec-card:hover{border-color:var(--cyan);background:rgba(0,212,255,0.12);}
.rec-mood{font-size:16px;margin-bottom:3px;}
.rec-label{font-size:9px;color:var(--cyan);letter-spacing:0.1em;}
.rec-sub{font-size:8px;color:var(--text-dim);margin-top:2px;}
.jarvis-suggest{padding:10px;border-top:1px solid var(--border);}
.suggest-inp{display:flex;gap:6px;}
.suggest-inp input{flex:1;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 9px;outline:none;}
.suggest-inp input::placeholder{color:var(--text-dim);}
.suggest-inp input:focus{border-color:var(--cyan);}

/* ASTRO TAB */
.astro-layout{display:grid;grid-template-columns:1fr 1fr 1fr;width:100%;height:100%;}
.apnl{display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid var(--border);}
.apnl:last-child{border-right:none;}
.rcard{background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;padding:9px 11px;margin-bottom:8px;}
.rcard-lbl{font-size:7px;color:var(--text-dim);letter-spacing:0.2em;margin-bottom:2px;}
.rcard-val{font-size:13px;color:var(--cyan);font-family:'Orbitron',sans-serif;font-weight:700;}
.rcard-sub{font-size:8px;color:var(--text-dim);margin-top:2px;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.dcard{background:var(--cyan-faint);border:1px solid var(--cyan);border-radius:4px;padding:10px;margin-bottom:8px;position:relative;overflow:hidden;}
.dcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--cyan);border-radius:2px 0 0 2px;}
.dcard.ant{border-color:var(--purple);}
.dcard.ant::before{background:var(--purple);}
.dpl{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--cyan);font-weight:700;}
.dcard.ant .dpl{color:var(--purple);}
.ddt{font-size:8px;color:var(--text-dim);margin-top:2px;}
.dprog{height:3px;background:rgba(0,212,255,0.15);border-radius:2px;margin-top:7px;overflow:hidden;}
.dprogf{height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));border-radius:2px;transition:width 0.5s;}
.dcard.ant .dprogf{background:linear-gradient(90deg,#7020bb,var(--purple));}
.ptbl{width:100%;border-collapse:collapse;font-size:9px;}
.ptbl th{color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:0.15em;padding:4px 7px;border-bottom:1px solid var(--border);text-align:left;}
.ptbl td{padding:4px 7px;border-bottom:1px solid rgba(0,212,255,0.05);color:var(--text);}
.ptbl tr:hover td{background:var(--cyan-faint);}
.de{color:var(--gold);}.dd{color:var(--red);}.dx{color:var(--green);}.df{color:var(--orange);}
.titem{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(0,212,255,0.06);}
.tpl{font-size:14px;flex-shrink:0;width:22px;text-align:center;}
.tinf{flex:1;}
.ttitle{font-size:9px;color:var(--cyan);letter-spacing:0.1em;}
.tdesc{font-size:8px;color:var(--text-dim);margin-top:2px;line-height:1.5;}
.tbadge{font-size:7px;padding:2px 5px;border-radius:3px;margin-top:2px;display:inline-block;}
.tbadge.app{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green);}
.tbadge.sep{background:rgba(255,149,0,0.1);border:1px solid rgba(255,149,0,0.3);color:var(--orange);}

/* HORARY */
.horary-layout{display:grid;grid-template-columns:280px 1fr 1fr;width:100%;height:100%;}
.hpnl{display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid var(--border);}
.hpnl:last-child{border-right:none;}
.fgrp{margin-bottom:10px;}
.flbl{font-size:8px;color:var(--cyan);letter-spacing:0.2em;margin-bottom:4px;display:block;}
.finp{width:100%;background:var(--cyan-faint);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:7px 9px;border-radius:3px;outline:none;transition:border-color 0.3s;}
.finp:focus{border-color:var(--cyan);}
.finp::placeholder{color:var(--text-dim);}
.cbtn{width:100%;padding:9px;background:var(--cyan-faint);border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.2em;cursor:pointer;border-radius:3px;transition:all 0.3s;margin-top:3px;}
.cbtn:hover{background:rgba(0,212,255,0.18);box-shadow:0 0 12px var(--cyan-glow);}
.cbtn.g{border-color:var(--gold);color:var(--gold);}
.cbtn.g:hover{background:rgba(255,215,0,0.1);}
.hts{background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;padding:9px;margin-bottom:10px;}
.hts-lbl{font-size:7px;color:var(--text-dim);letter-spacing:0.15em;margin-bottom:3px;}
.hts-val{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--cyan);}
.verdict{font-family:'Orbitron',sans-serif;font-size:10px;padding:7px 10px;border-radius:3px;margin-bottom:8px;letter-spacing:0.1em;}
.verdict.yes{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green);}
.verdict.no{background:rgba(255,60,60,0.1);border:1px solid rgba(255,60,60,0.3);color:var(--red);}
.verdict.maybe{background:rgba(255,149,0,0.1);border:1px solid rgba(255,149,0,0.3);color:var(--orange);}
.ibox{background:rgba(0,212,255,0.03);border:1px solid var(--border);border-radius:3px;padding:10px;font-size:10px;line-height:1.7;color:var(--text);}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:10000;align-items:center;justify-content:center;}
.modal-ov.on{display:flex;}
.modal{background:#000c18;border:1px solid var(--cyan);border-radius:6px;padding:26px;width:94%;max-width:500px;box-shadow:0 0 40px var(--cyan-glow);max-height:92vh;overflow-y:auto;}
.modal h2{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--cyan);letter-spacing:0.3em;margin-bottom:4px;}
.modal .msub{font-size:9px;color:var(--text-dim);margin-bottom:16px;line-height:1.6;}
.msection{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.msection:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.mlbl{font-size:8px;color:var(--cyan);letter-spacing:0.2em;margin-bottom:6px;display:block;}
.mdesc{font-size:8px;color:var(--text-dim);margin-bottom:7px;line-height:1.5;}
.mdesc a{color:var(--cyan);text-decoration:none;}
.modal input,.modal select{width:100%;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:8px 10px;outline:none;margin-bottom:6px;transition:border-color 0.3s;}
.modal input:focus{border-color:var(--cyan);}
.modal input::placeholder{color:var(--text-dim);}
.mbtn2{width:100%;padding:10px;background:var(--cyan-faint);border:1px solid var(--cyan);color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:0.2em;cursor:pointer;border-radius:3px;transition:all 0.3s;}
.mbtn2:hover{background:rgba(0,212,255,0.2);}
.mnote{font-size:8px;color:var(--text-dim);margin-top:10px;line-height:1.5;text-align:center;}
.optag{font-size:7px;background:rgba(255,149,0,0.1);border:1px solid rgba(255,149,0,0.3);color:var(--orange);padding:2px 5px;border-radius:2px;margin-left:6px;}

/* YT LOCAL NOTICE */
.yt-notice{padding:20px;text-align:center;color:var(--text-dim);font-size:10px;line-height:1.8;}
.yt-notice a{color:var(--cyan);}

/* SYNASTRY */
.synastry-layout{display:grid;grid-template-columns:1fr 1fr 1fr;width:100%;height:100%;}
.spnl{display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid var(--border);}
.spnl:last-child{border-right:none;}
.aspect-table{width:100%;border-collapse:collapse;font-size:9px;}
.aspect-table th{color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:7px;letter-spacing:0.15em;padding:4px 6px;border-bottom:1px solid var(--border);text-align:left;}
.aspect-table td{padding:4px 6px;border-bottom:1px solid rgba(0,212,255,0.05);color:var(--text);}
.asp-conj{color:var(--cyan);font-weight:bold;}.asp-trine{color:var(--green);}.asp-sext{color:#88ff88;}.asp-sq{color:var(--orange);}.asp-opp{color:var(--red);}
.kuta-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,212,255,0.07);font-size:9px;}
.kuta-name{color:var(--text-dim);}.kuta-score{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--cyan);}
.compat-bar{height:3px;background:rgba(0,212,255,0.1);border-radius:2px;overflow:hidden;margin-top:3px;}
.compat-fill{height:100%;border-radius:2px;transition:width 0.8s ease;}

/* FITNESS */
.fitness-layout{display:grid;grid-template-columns:280px 1fr 280px;width:100%;height:100%;}
.fpnl{display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid var(--border);}
.fpnl:last-child{border-right:none;}
.metric-inp{width:100%;background:var(--cyan-faint);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:10px;padding:6px 8px;outline:none;transition:border-color 0.3s;margin-bottom:5px;}
.metric-inp:focus{border-color:var(--cyan);}
.metric-inp::placeholder{color:var(--text-dim);}
.metric-row{display:flex;gap:5px;margin-bottom:5px;}
.metric-row .metric-inp{margin-bottom:0;}
.metric-log-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,212,255,0.06);font-size:9px;}
.metric-log-date{color:var(--text-dim);}.metric-log-val{color:var(--cyan);font-family:'Orbitron',sans-serif;font-size:10px;}.metric-log-bf{color:var(--purple);font-size:9px;}
.workout-card{background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;padding:9px;margin-bottom:7px;}
.workout-date{font-size:8px;color:var(--text-dim);letter-spacing:0.15em;margin-bottom:5px;}
.ex-row{display:flex;gap:4px;margin-bottom:4px;align-items:center;flex-wrap:wrap;}
.ex-inp{background:rgba(0,212,255,0.06);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:9px;padding:4px 6px;outline:none;}
.ex-inp::placeholder{color:var(--text-dim);}
.pl-badge{font-size:8px;padding:2px 6px;border-radius:3px;margin-left:4px;}
.pl-up{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--green);}
.pl-same{background:rgba(255,149,0,0.1);border:1px solid rgba(255,149,0,0.3);color:var(--orange);}

/* BIORHYTHM */
.bio-layout{display:grid;grid-template-columns:240px 1fr;width:100%;height:100%;}
.bpnl{display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid var(--border);}
.bio-card{background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;padding:10px;margin-bottom:7px;}
.bio-card-lbl{font-size:8px;color:var(--text-dim);letter-spacing:0.2em;margin-bottom:3px;}
.bio-val{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;}
.bio-bar{height:4px;background:rgba(0,212,255,0.1);border-radius:2px;overflow:hidden;margin-top:5px;}
.bio-fill{height:100%;border-radius:2px;transition:width 0.8s ease;}

/* RELATIONSHIP */
.rel-layout{display:grid;grid-template-columns:240px 1fr;width:100%;height:100%;}
.rpnl2{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow-y:auto;}
.rpnl2:last-child{border-right:none;overflow:hidden;}
.persona-card{background:var(--cyan-faint);border:1px solid var(--border);border-radius:4px;padding:9px;margin-bottom:6px;cursor:pointer;transition:all 0.3s;}
.persona-card:hover{border-color:var(--cyan);}
.persona-card.active{border-color:var(--pink);background:rgba(255,110,180,0.06);}
.persona-name{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--cyan);margin-bottom:2px;}
.persona-card.active .persona-name{color:var(--pink);}
.persona-desc{font-size:8px;color:var(--text-dim);line-height:1.5;}
.rel-chat-wrap{display:flex;flex-direction:column;height:100%;}
.rel-chat{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;}
.rel-msg{display:flex;flex-direction:column;gap:2px;max-width:88%;animation:min 0.3s ease;position:relative;}
.rel-msg.u{align-self:flex-end;}.rel-msg.p{align-self:flex-start;}
.rel-mlbl{font-size:7px;letter-spacing:0.2em;color:var(--text-dim);padding:0 3px;}
.rel-msg.u .rel-mlbl{text-align:right;color:rgba(255,149,0,0.6);}
.rel-msg.p .rel-mlbl{color:rgba(255,110,180,0.7);}
.rel-mbub{padding:9px 13px;font-size:11px;line-height:1.7;border-radius:4px;position:relative;}
.rel-msg.u .rel-mbub{background:rgba(255,149,0,0.08);border:1px solid rgba(255,149,0,0.2);color:#ffd180;border-radius:4px 4px 0 4px;}
.rel-msg.p .rel-mbub{background:rgba(255,110,180,0.05);border:1px solid rgba(255,110,180,0.2);color:var(--text);border-radius:4px 4px 4px 0;}
.rel-msg.p .rel-mbub::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--pink),transparent);border-radius:2px 0 0 2px;}
.rel-inp-area{padding:10px 14px;border-top:1px solid var(--border);background:rgba(0,6,14,0.97);display:flex;gap:7px;align-items:flex-end;flex-shrink:0;}
.rel-inp{flex:1;background:rgba(255,110,180,0.05);border:1px solid rgba(255,110,180,0.2);border-radius:4px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:11px;padding:10px;outline:none;resize:none;min-height:40px;max-height:90px;line-height:1.5;transition:border-color 0.3s;}
.rel-inp:focus{border-color:var(--pink);}
.rel-inp::placeholder{color:var(--text-dim);}
.rel-send{width:40px;height:40px;background:rgba(255,110,180,0.08);border:1px solid rgba(255,110,180,0.3);border-radius:4px;color:var(--pink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.3s;}
.rel-send:hover{background:rgba(255,110,180,0.15);}
.rel-clear{padding:0 10px;height:40px;background:rgba(255,60,60,0.06);border:1px solid rgba(255,60,60,0.25);border-radius:4px;color:var(--red);font-size:10px;cursor:pointer;transition:all 0.2s;}

/* MOBILE */
@media(max-width:768px){
  .hdr{padding:8px 12px;}
  .logo h1{font-size:14px;letter-spacing:0.15em;}
  .logo p{display:none;}.sdots{display:none;}.clk{font-size:13px;}
  .tabbar{overflow-x:auto;}.tab{padding:7px 9px;font-size:7px;}
  .chat-layout,.fitness-layout,.synastry-layout,.astro-layout,.horary-layout,.bio-layout,.rel-layout{grid-template-columns:1fr!important;}
  .lpnl,.rpnl,.fpnl:not(:first-child),.spnl:not(:first-child),.apnl:not(:first-child),.hpnl:not(:first-child),.bpnl,.rpnl2:first-child,.music-lpnl{display:none!important;}
  .cpnl,.fpnl:first-child,.spnl:first-child,.apnl:first-child,.hpnl:first-child{border:none!important;}
  .ibtn.council{display:none;}
  .music-layout{grid-template-columns:1fr!important;}
}
@media(max-width:480px){
  .loc-badge{display:none;}.nsfw-tog{padding:5px 8px;}
}

<script>
// =====================
// STATE
// =====================
let nsfwMode=false,unhingedMode=false,currentMode='standard',currentTab='chat';
let userProfile=localStorage.getItem('j_profile')||'';
let convHist=JSON.parse(localStorage.getItem('j_convhist')||'[]');
let queryHist=JSON.parse(localStorage.getItem('j_queryhist')||'[]');
const MAX_HIST=60;
let kb=JSON.parse(localStorage.getItem('j_kb')||'[]');
let groqKey=localStorage.getItem('j_groq')||'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';
let orKey=localStorage.getItem('j_or')||'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';
let orModel=localStorage.getItem('j_orm')||'gryphe/mythomax-l2-13b';
let natal=JSON.parse(localStorage.getItem('j_natal')||'{}');
let wakeWord=localStorage.getItem('j_wake')||'JARVIS';
let tavilyKey=localStorage.getItem('j_tavily')||'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';
let weatherKey=localStorage.getItem('j_weather')||'';
let userLat=null,userLng=null,locationName='Unknown';
let synth=window.speechSynthesis,voiceSel=null,voiceName='auto';
let recognition=null,isListening=false,wakeListening=false,wakeRecog=null;
let pendingImg=null,pendingImgB64=null;
let lastHorary=null;
let allVoices=[],femaleVoices=[];
let queue=[],currentTrack=0,ytPlayer=null,isPlaying=false;
let bgImg='',bgOpacity=0.2;

// =====================
// INIT
// =====================
document.addEventListener('DOMContentLoaded',()=>{
  updateClock(); setInterval(updateClock,1000);
  animStats(); setInterval(animStats,4500);
  if(userProfile) document.getElementById('profile-ta').value=userProfile;
  document.getElementById('wake-word').value=wakeWord;
  renderKBTags(); renderQueue();
  document.getElementById('init-t').textContent=ts();
  setInterval(updateHTS,1000);
  initVoices();
  loadBGFromStorage();
  if(!groqKey){ document.getElementById('setup-modal').classList.add('on'); }
  else{
    initSystems();
    if(convHist.length>0){ loadHistoryToChat(); }
    else{ showWelcome(); }
    if(natal.dob){setTimeout(()=>{calcDasha();calcTransits();renderNatal();},600);}
  }
  requestLocation();

  // Rate/pitch labels
  document.getElementById('v-rate').oninput=function(){document.getElementById('v-rate-val').textContent=this.value;};
  document.getElementById('v-pitch').oninput=function(){document.getElementById('v-pitch-val').textContent=this.value;};
});

// =====================
// LOCATION
// =====================
function requestLocation(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLng=pos.coords.longitude;
    setDot('d-loc','green');
    document.getElementById('s-loc').textContent=`${userLat.toFixed(2)}, ${userLng.toFixed(2)}`;
    document.getElementById('loc-badge').textContent=`📍 ${userLat.toFixed(2)}, ${userLng.toFixed(2)}`;
    // Auto-fill horary and natal fields
    document.getElementById('h-lat').value=userLat.toFixed(4);
    document.getElementById('h-lng').value=userLng.toFixed(4);
    if(!natal.lat){ document.getElementById('m-lat').value=userLat.toFixed(4); document.getElementById('m-lng').value=userLng.toFixed(4); }
    addLog(`Location acquired: ${userLat.toFixed(3)}, ${userLng.toFixed(3)}`);
  },err=>{
    addLog('Location access denied.');
    document.getElementById('s-loc').textContent='LOC DENIED';
  });
}

// =====================
// SETUP
// =====================
function saveSetup(){
  const g=document.getElementById('m-groq').value.trim();
  if(!g){alert('Groq key required.');return;}
  groqKey=g; localStorage.setItem('j_groq',g);
  const o=document.getElementById('m-or').value.trim();
  if(o){orKey=o;localStorage.setItem('j_or',o);}
  orModel=document.getElementById('m-or-model').value; localStorage.setItem('j_orm',orModel);
  const dob=document.getElementById('m-dob').value.trim();
  const tob=document.getElementById('m-tob').value.trim();
  const lat=parseFloat(document.getElementById('m-lat').value)||userLat||12.9716;
  const lng=parseFloat(document.getElementById('m-lng').value)||userLng||77.5946;
  if(dob){ natal={dob,tob:tob||'12:00',lat,lng}; localStorage.setItem('j_natal',JSON.stringify(natal)); }
  const ww=document.getElementById('m-wake').value.trim().toUpperCase();
  if(ww){ wakeWord=ww; localStorage.setItem('j_wake',ww); document.getElementById('wake-word').value=ww; }
  const tv=document.getElementById('m-tavily').value.trim();
  if(tv){ tavilyKey=tv; localStorage.setItem('j_tavily',tv); }
  const wk=document.getElementById('m-weather').value.trim();
  if(wk){ weatherKey=wk; localStorage.setItem('j_weather',wk); }
  document.getElementById('setup-modal').classList.remove('on');
  initSystems(); showWelcome();
  if(natal.dob){setTimeout(()=>{calcDasha();calcTransits();renderNatal();},500);}
}
function openSetup(){
  document.getElementById('setup-modal').classList.add('on');
  // Pre-fill with saved values
  if(groqKey) document.getElementById('m-groq').value=groqKey;
  if(orKey) document.getElementById('m-or').value=orKey;
  if(orModel) document.getElementById('m-or-model').value=orModel;
  if(natal.dob){ document.getElementById('m-dob').value=natal.dob; document.getElementById('m-tob').value=natal.tob||''; document.getElementById('m-lat').value=natal.lat||''; document.getElementById('m-lng').value=natal.lng||''; }
  if(wakeWord) document.getElementById('m-wake').value=wakeWord;
  if(tavilyKey) document.getElementById('m-tavily').value=tavilyKey;
  if(weatherKey) document.getElementById('m-weather').value=weatherKey;
}

function initSystems(){
  if(groqKey){ setDot('d-groq','green'); document.getElementById('s-groq').textContent='GROQ ONLINE'; setBadge('groq-badge','ONLINE','online'); }
  if(orKey){ setDot('d-or','pur'); document.getElementById('s-or').textContent='OR ONLINE'; setBadge('or-badge','ONLINE','online'); addLog('OpenRouter online. Override ready.'); }
  if(tavilyKey||weatherKey){
    setDot('d-search','green');
    const parts=[];
    if(tavilyKey) parts.push('SEARCH');
    if(weatherKey) parts.push('WEATHER');
    document.getElementById('s-search').textContent=parts.join('+')+ ' ONLINE';
    addLog('Real-time: '+parts.join(' + ')+' online.');
  }
  updateEngineDisplay(); addLog('J.A.R.V.I.S v7 all systems online.');
}
function setDot(id,c){
  const d=document.getElementById(id); if(!d)return;
  const cm={green:'var(--green)',orange:'var(--orange)',pur:'var(--purple)',off:'#333'};
  d.style.background=cm[c]||c; d.style.boxShadow=c==='off'?'none':`0 0 5px ${cm[c]||c}`;
  d.style.animation=c==='off'?'none':'dpulse 2s ease-in-out infinite';
}
function setBadge(id,t,c){ const e=document.getElementById(id); if(e){e.textContent=t;e.className='api-badge '+c;} }
function updateEngineDisplay(){
  const e=document.getElementById('mdisplay'); if(!e)return;
  const lbl={standard:'STANDARD',analyst:'ANALYST',creative:'CREATIVE',astro:'ASTROLOGY',fitness:'FITNESS',shadow:'SHADOW WORK',companion:'COMPANION',unhinged:'💀 UNHINGED'};
  const eng=nsfwMode&&orKey?'OPENROUTER':'GROQ';
  let extra=nsfwMode?' // OVERRIDE':'';
  if(unhingedMode) extra+=' // 💀 UNHINGED';
  e.textContent=`MODE: ${lbl[currentMode]||currentMode} // ${eng}${extra}`;
  e.style.color=unhingedMode?'var(--red)':nsfwMode?'var(--pink)':'var(--text-dim)';
}

// =====================
// CLOCK
// =====================
function updateClock(){ const n=new Date(); document.getElementById('clk').textContent=n.toTimeString().split(' ')[0]; document.getElementById('clkd').textContent=n.toDateString().toUpperCase(); }
function ts(){ return new Date().toTimeString().split(' ')[0]; }
function updateHTS(){ const e=document.getElementById('h-ts'); if(e)e.textContent=new Date().toLocaleString('en-IN',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

// =====================
// STATS
// =====================
function animStats(){
  [{b:'sb-cpu',v:'sv-cpu',mn:20,mx:75},{b:'sb-mem',v:'sv-mem',mn:35,mx:65},{b:'sb-neu',v:'sv-neu',mn:80,mx:99}].forEach(s=>{
    const val=Math.floor(Math.random()*(s.mx-s.mn)+s.mn);
    const b=document.getElementById(s.b),vv=document.getElementById(s.v);
    if(b)b.style.width=val+'%'; if(vv)vv.textContent=val+'%';
  });
}

// =====================
// BACKGROUND
// =====================

function initVoices(){
  const load=()=>{
    allVoices=synth.getVoices();
    const fkw=['female','woman','zira','samantha','victoria','karen','moira','fiona','veena','ava','allison','susan','nicky','sarah','tessa','siri','cortana','google uk english female','google us english'];
    femaleVoices=allVoices.filter(v=>fkw.some(k=>v.name.toLowerCase().includes(k)));
    if(femaleVoices.length===0) femaleVoices=allVoices.filter(v=>v.lang.startsWith('en'));
    buildVoiceGrid();
  };
  load(); synth.onvoiceschanged=load;
}

function buildVoiceGrid(){
  const g=document.getElementById('vgrid'); if(!g)return;
  let h=`<button class="vbtn" onclick="setVoice('off',this)">🔇 OFF</button>`;
  h+=`<button class="vbtn on" id="vbtn-auto" onclick="setVoice('auto',this)">⚡ AUTO</button>`;
  femaleVoices.slice(0,6).forEach((v,i)=>{
    const n=v.name.replace(/Microsoft |Google |\(Natural\)| Online| Desktop/g,'').trim().substring(0,11);
    h+=`<button class="vbtn" onclick="setVoiceIdx(${allVoices.indexOf(v)},this)">👩 ${n}</button>`;
  });
  g.innerHTML=h;
}

function setVoice(type,btn){ voiceName=type; voiceSel=null; updateVBtns(btn); updateVLabel(); }
function setVoiceIdx(idx,btn){ voiceSel=allVoices[idx]; voiceName=allVoices[idx]?.name||'auto'; updateVBtns(btn); updateVLabel(); speak('Voice confirmed. Ready, sir.'); }
function updateVBtns(active){ document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on')); if(active)active.classList.add('on'); }
function updateVLabel(){ const e=document.getElementById('vlabel'); if(e)e.textContent=voiceName==='off'?'':'🔊 '+voiceName.substring(0,12); document.getElementById('voice-status')&&(document.getElementById('voice-status').textContent=voiceName.substring(0,14)); }

function getVoicePersonality(){
  // Different voice params by mode
  if(nsfwMode) return {rate:0.88,pitch:1.35}; // Slower, higher pitch = more intimate
  if(currentMode==='shadow'||currentMode==='analyst') return {rate:0.95,pitch:1.0}; // Professional
  if(currentMode==='creative'||currentMode==='companion') return {rate:1.05,pitch:1.2}; // Warm casual
  return {rate:1.0,pitch:1.1}; // Default
}

function speak(text){
  if(voiceName==='off')return;
  synth.cancel();
  const clean=text.replace(/<[^>]*>/g,'').replace(/\*\*/g,'').replace(/`/g,'').replace(/\[.*?\]/g,'');
  const utt=new SpeechSynthesisUtterance(clean.substring(0,400));
  if(voiceSel) utt.voice=voiceSel;
  else if(femaleVoices.length>0&&voiceName!=='off') utt.voice=femaleVoices[0];
  const p=getVoicePersonality();
  utt.rate=parseFloat(document.getElementById('v-rate').value)||p.rate;
  utt.pitch=parseFloat(document.getElementById('v-pitch').value)||p.pitch;
  utt.volume=1;
  synth.speak(utt);
}

function toggleMic(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){ addMsg('j','Speech recognition not available in this browser, sir. Try Chrome.'); return; }
  if(isListening){ recognition&&recognition.stop(); return; }
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.lang='en-US'; recognition.continuous=false; recognition.interimResults=false;
  recognition.onstart=()=>{ isListening=true; document.getElementById('mic-btn').classList.add('mic-on'); addLog('Mic active — listening...'); };
  recognition.onresult=e=>{ const t=e.results[0][0].transcript; document.getElementById('ui').value=t; autoResize(document.getElementById('ui')); };
  recognition.onend=()=>{ isListening=false; document.getElementById('mic-btn').classList.remove('mic-on'); };
  recognition.onerror=e=>{ isListening=false; document.getElementById('mic-btn').classList.remove('mic-on'); addLog('Mic error: '+e.error); };
  recognition.start();
}

let wakeActive=false;
function toggleWake(){
  if(wakeActive){ stopWake(); return; }
  startWake();
}

function startWake(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){ addLog('Wake word not supported.'); return; }
  wakeActive=true;
  document.getElementById('wake-ind').textContent=`🔴 WAKE: ${wakeWord}`;
  document.getElementById('wake-ind').classList.add('active');
  listenForWake();
  addLog('Wake word listening: '+wakeWord);
}

function stopWake(){
  wakeActive=false; wakeRecog&&wakeRecog.stop();
  document.getElementById('wake-ind').textContent='🎤 WAKE: OFF';
  document.getElementById('wake-ind').classList.remove('active');
}

function listenForWake(){
  if(!wakeActive)return;
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  wakeRecog=new SR();
  wakeRecog.lang='en-US'; wakeRecog.continuous=false; wakeRecog.interimResults=false;
  wakeRecog.onresult=e=>{
    const said=e.results[0][0].transcript.toLowerCase();
    if(said.includes(wakeWord.toLowerCase())){
      addLog('Wake word detected: "'+said+'"');
      speak('Yes, how can I help?');
      setTimeout(()=>toggleMic(),800);
    }
  };
  wakeRecog.onend=()=>{ if(wakeActive)setTimeout(listenForWake,300); };
  wakeRecog.onerror=()=>{ if(wakeActive)setTimeout(listenForWake,1000); };
  try{ wakeRecog.start(); }catch(e){}
}

async function summonCouncil(){
  const q=document.getElementById('council-q').value.trim();
  if(!q||!groqKey)return;
  const body=document.getElementById('council-body');
  body.innerHTML=`<div class="council-loading"><div class="council-loading-dots"><div class="council-loading-dot" style="background:var(--cyan)"></div><div class="council-loading-dot" style="background:var(--purple)"></div><div class="council-loading-dot" style="background:var(--gold)"></div></div><span>Jarvis is selecting council members and convening...</span></div>`;

  addLog('Council convened: "'+q.substring(0,30)+'..."');

  try{
    // Step 1: Jarvis picks which 2-3 members are most relevant
    const pickRes=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[
        {role:'system',content:`You are J.A.R.V.I.S selecting which council members to summon. The council members are: analyst, shadow, unhinged, oracle, seducer. Pick the 2-3 most relevant for the question. Also note if seducer requires OpenRouter (explicit content). Respond ONLY with a JSON array of member names, e.g. ["analyst","shadow","oracle"]. No other text.`},
        {role:'user',content:`Question: "${q}"\nAvailable members: analyst, shadow, unhinged, oracle, seducer\nOpenRouter available: ${!!orKey}`}
      ],max_tokens:60,temperature:0.3})
    });
    const pickData=await pickRes.json();
    let chosen=['analyst','shadow'];
    try{
      const raw=pickData.choices[0].message.content.trim();
      const match=raw.match(/\[.*?\]/s);
      if(match) chosen=JSON.parse(match[0]);
    }catch(e){}

    // Filter seducer to OR only
    chosen=chosen.filter(m=>m!=='seducer'||(m==='seducer'&&orKey));
    if(chosen.length===0) chosen=['analyst','shadow'];

    addLog(`Council members selected: ${chosen.join(', ')}`);

    // Step 2: Call each member in parallel
    const memberCalls=chosen.map(async memberId=>{
      const member=COUNCIL_MEMBERS[memberId];
      if(!member) return null;
      const isSeducer=memberId==='seducer';
      const apiUrl=isSeducer&&orKey?'https://openrouter.ai/api/v1/chat/completions':'https://api.groq.com/openai/v1/chat/completions';
      const headers={'Content-Type':'application/json','Authorization':'Bearer '+(isSeducer&&orKey?orKey:groqKey)};
      if(isSeducer&&orKey){headers['HTTP-Referer']=window.location.href;headers['X-Title']='JARVIS';}
      const model=isSeducer&&orKey?orModel:'llama-3.3-70b-versatile';
      const contextNote=userProfile?`\n\nOperator context: ${userProfile}`:'';
      const r=await fetch(apiUrl,{method:'POST',headers,body:JSON.stringify({model,messages:[{role:'system',content:member.prompt+contextNote},{role:'user',content:q}],max_tokens:400,temperature:memberId==='unhinged'?1.1:0.85})});
      if(!r.ok) throw new Error(memberId+' API failed');
      const d=await r.json();
      return{id:memberId,member,response:d.choices[0].message.content};
    });

    const results=await Promise.allSettled(memberCalls);
    const successful=results.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);

    // Step 3: Jarvis synthesis
    const synthContext=successful.map(r=>`${r.member.name}: ${r.response}`).join('\n\n');
    const synthRes=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+groqKey},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[
        {role:'system',content:`You are J.A.R.V.I.S providing a final synthesis after hearing your council. Weave the key insights from each advisor into a cohesive final assessment. Be concise but penetrating. 2-3 sentences max. Sign off as Jarvis.`},
        {role:'user',content:`Question: "${q}"\n\nCouncil responses:\n${synthContext}`}
      ],max_tokens:200,temperature:0.7})
    });
    const synthData=await synthRes.json();
    const synthesis=synthData.choices[0].message.content;

    // Render results
    let html='';
    successful.forEach(r=>{
      const resp=r.response.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
      html+=`<div class="member-card ${r.member.card}">
        <div class="member-hdr">
          <span class="member-icon">${r.member.icon}</span>
          <div><div class="member-name">${r.member.name}</div><div class="member-tagline">${r.member.tagline}</div></div>
        </div>
        <div class="member-body">${resp}</div>
      </div>`;
    });
    html+=`<div class="council-synthesis">
      <div class="synthesis-hdr">⚡ J.A.R.V.I.S — COUNCIL SYNTHESIS</div>
      <div class="synthesis-body">${synthesis.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
    </div>`;
    body.innerHTML=html;
    speak(synthesis);
    // Save council session
    councilHistory.unshift({date:new Date().toLocaleDateString('en-IN'),question:q,members:successful.map(r=>r.member.name),synthesis});
    if(councilHistory.length>20) councilHistory=councilHistory.slice(0,20);
    localStorage.setItem('j_council_hist',JSON.stringify(councilHistory));
    addLog('Council session complete. '+successful.length+' members responded.');

  }catch(err){
    body.innerHTML=`<div style="padding:20px;color:var(--red);font-size:10px">Council error: ${err.message}</div>`;
    addLog('Council ERROR: '+err.message);
  }
}

const SEARCH_TRIGGERS=/\b(weather|temperature|forecast|today|tonight|tomorrow|news|latest|current|right now|happening|score|price|stock|who is|what is.*today|when is|live|update|trending)\b/i;
const WEATHER_TRIGGERS=/\b(weather|temperature|forecast|rain|sunny|humid|cold|hot|climate|wind)\b/i;

function needsRealTime(text){ return SEARCH_TRIGGERS.test(text); }
function needsWeather(text){ return WEATHER_TRIGGERS.test(text); }

async function getWeather(){
  if(!weatherKey||!userLat)return null;
  try{
    const r=await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${userLat}&lon=${userLng}&appid=${weatherKey}&units=metric`);
    if(!r.ok)return null;
    const d=await r.json();
    return `Current weather at ${d.name}: ${d.weather[0].description}, ${d.main.temp}°C (feels like ${d.main.feels_like}°C), humidity ${d.main.humidity}%, wind ${d.wind.speed}m/s.`;
  }catch(e){return null;}
}

async function searchWeb(query){
  if(!tavilyKey)return null;
  try{
    const r=await fetch('https://api.tavily.com/search',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({api_key:tavilyKey,query,search_depth:'basic',max_results:4,include_answer:true})
    });
    if(!r.ok)return null;
    const d=await r.json();
    let result='';
    if(d.answer) result+=`Summary: ${d.answer}\n\n`;
    if(d.results&&d.results.length){
      result+='Sources:\n';
      d.results.slice(0,3).forEach(s=>{ result+=`• ${s.title}: ${s.content.substring(0,200)}...\n`; });
    }
    return result||null;
  }catch(e){return null;}
}

async function gatherRealTimeContext(text){
  const ctx=[];
  const isWeather=needsWeather(text);
  const isSearch=needsRealTime(text)&&!isWeather;

  if(isWeather&&weatherKey){
    addLog('Fetching live weather data...');
    const w=await getWeather();
    if(w) ctx.push('LIVE WEATHER DATA:\n'+w);
  }

  if((isSearch||isWeather)&&tavilyKey&&!isWeather){
    addLog('Searching web: "'+text.substring(0,40)+'"...');
    const s=await searchWeb(text);
    if(s) ctx.push('LIVE WEB SEARCH RESULTS:\n'+s);
  }

  return ctx.length?ctx.join('\n\n'):null;
}

function n360(d){return((d%360)+360)%360;}
function gSign(l){return Math.floor(l/30);}
function gDeg(l){return l%30;}

function toJD(dt){
  let y=dt.getUTCFullYear(),m=dt.getUTCMonth()+1,d=dt.getUTCDate();
  const h=dt.getUTCHours()+dt.getUTCMinutes()/60+dt.getUTCSeconds()/3600;
  if(m<=2){y--;m+=12;} const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+h/24+B-1524.5;
}

function getAyanamsa(T){
  // Lahiri (Chitrapaksha) ayanamsa — dynamic
  return 23.85 + (T+1.3)/72;
}

function getPlanets(dt){
  const JD=toJD(dt),T=(JD-2451545)/36525,p={};
  const deg=x=>x*Math.PI/180;

  // Sun — improved
  const L0=280.46646+36000.76983*T+0.0003032*T*T;
  const M0=357.52911+35999.05029*T-0.0001537*T*T;
  const Mr=deg(M0);
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mr)
         +(0.019993-0.000101*T)*Math.sin(2*Mr)
         +0.000289*Math.sin(3*Mr);
  const sunLon=L0+C;
  // Aberration correction
  p.Sun=n360(sunLon-0.00569-0.00478*Math.sin(deg(125.04-1934.136*T)));

  // Moon — improved with more terms
  const Lm=218.3165+481267.8813*T-0.00146*T*T;
  const Mm=134.9634+477198.8676*T+0.008997*T*T; // Moon anomaly
  const Dm=297.8502+445267.1115*T-0.00163*T*T;  // Moon elongation
  const Fm=93.2721+483202.0175*T-0.0034*T*T;    // Moon arg latitude
  const Om=125.0445-1934.1362*T+0.0020708*T*T;  // Moon node
  const moonLon=Lm
    +6.2886*Math.sin(deg(Mm))
    +1.2740*Math.sin(deg(2*Dm-Mm))
    +0.6583*Math.sin(deg(2*Dm))
    +0.2136*Math.sin(deg(2*Mm))
    -0.1851*Math.sin(deg(Dm))
    -0.1143*Math.sin(deg(2*Fm))
    +0.0588*Math.sin(deg(2*Dm-2*Mm))
    +0.0572*Math.sin(deg(2*Dm-Mm+Om*0.5))
    +0.0533*Math.sin(deg(2*Dm+Mm))
    +0.0458*Math.sin(deg(2*Dm-Om))
    -0.0409*Math.sin(deg(Mm-Om))
    +0.0347*Math.sin(deg(Mm+2*Fm))
    -0.0304*Math.sin(deg(2*Fm-2*Dm))
    +0.0154*Math.sin(deg(2*Mm-2*Dm));
  p.Moon=n360(moonLon);

  // Mercury — improved
  const Lmer=252.2509+149472.6749*T-0.000035*T*T;
  const Mmer=168.6562+149472.5153*T;
  p.Mercury=n360(Lmer
    +23.4405*Math.sin(deg(Mmer))
    +2.9818*Math.sin(deg(2*Mmer))
    +0.5255*Math.sin(deg(3*Mmer))
    +0.1058*Math.sin(deg(4*Mmer)));

  // Venus — improved
  const Lven=181.9798+58517.8156*T+0.00031*T*T;
  const Mven=212.2606+58517.8039*T;
  p.Venus=n360(Lven
    +0.7758*Math.sin(deg(Mven))
    +0.0033*Math.sin(deg(2*Mven))
    -0.0200*Math.sin(deg(3.1416+Mven)));

  // Mars — improved
  const Lmar=355.433+19140.2993*T+0.000261*T*T;
  const Mmar=319.5294+19139.8585*T;
  p.Mars=n360(Lmar
    +10.6912*Math.sin(deg(Mmar))
    +0.6228*Math.sin(deg(2*Mmar))
    +0.0503*Math.sin(deg(3*Mmar))
    +0.0046*Math.sin(deg(4*Mmar)));

  // Jupiter — improved
  const Ljup=34.3515+3034.9057*T-0.000085*T*T;
  const Mjup=20.9202+3034.6955*T;
  p.Jupiter=n360(Ljup
    +5.5549*Math.sin(deg(Mjup))
    +0.1683*Math.sin(deg(2*Mjup))
    +0.0071*Math.sin(deg(3*Mjup)));

  // Saturn — improved
  const Lsat=50.0774+1222.1138*T+0.000129*T*T;
  const Msat=317.0207+1222.1138*T;
  p.Saturn=n360(Lsat
    +6.3585*Math.sin(deg(Msat))
    -0.2204*Math.sin(deg(2*Msat))
    +0.0100*Math.sin(deg(3*Msat)));

  // True Rahu (lunar node) — improved
  p.Rahu=n360(125.0445-1934.1362*T+0.0020708*T*T+0.0022*Math.sin(deg(Mm)));
  p.Ketu=n360(p.Rahu+180);

  return p;
}

function calcAsc(dt,lat,lng){
  const JD=toJD(dt),T=(JD-2451545)/36525;
  const GMST=280.46061837+360.98564736629*(JD-2451545)+0.000387933*T*T;
  const LMST=n360(GMST+lng),e=23.43929-0.013004*T;
  const lr=lat*Math.PI/180,er=e*Math.PI/180,lr2=LMST*Math.PI/180;
  return n360(Math.atan2(Math.cos(lr2),-(Math.sin(lr2)*Math.cos(er)+Math.tan(lr)*Math.sin(er)))*180/Math.PI);
}

function getNak(lon,T=0.25){ const ay=getAyanamsa(T),sid=n360(lon-ay),idx=Math.floor(sid/(360/27)),pada=Math.floor((sid%(360/27))/(360/27/4))+1; return{name:NAKS[idx]||'?',pada,sid,ay}; }

function getDig(planet,si){
  if(EXALT[planet]===si)return{l:'Exalted',c:'de'};

  if(RULERS[si]===planet)return{l:'Domicile',c:'dx'};
  return{l:'—',c:''};
}

function calcDasha(){
  if(!natal.dob)return;
  const bd=new Date(natal.dob+'T'+(natal.tob||'12:00')+':00');
  const bp=getPlanets(bd); const T2=(toJD(bd)-2451545)/36525; const mn=getNak(bp.Moon,T2);
  const ni=Math.floor(mn.sid/(360/27));
  const nr=['Ketu','Venus','Sun','Moon','Mars','Rahu','Jupiter','Saturn','Mercury'];
  const bri=ni%9; const br=nr[bri];
  const nakDeg=360/27; const posInNak=mn.sid%nakDeg; const frac=1-(posInNak/nakDeg);
  const dashas=[]; let sd=new Date(bd); let idx=bri;
  for(let i=0;i<9;i++){
    const pl=nr[idx%9]; const yrs=i===0?PPRD[pl]*frac:PPRD[pl];
    const ed=new Date(sd.getTime()+yrs*365.25*24*3600*1000);
    dashas.push({planet:pl,start:new Date(sd),end:ed,years:yrs}); sd=new Date(ed); idx++;
  }
  const now=new Date();
  const cur=dashas.find(d=>now>=d.start&&now<d.end)||dashas[dashas.length-1];
  const ads=[]; let as=new Date(cur.start);
  const ao=PORD.slice(PORD.indexOf(cur.planet)).concat(PORD.slice(0,PORD.indexOf(cur.planet)));
  ao.forEach(ap=>{ const ay=(PPRD[cur.planet]*PPRD[ap])/120; const ae=new Date(as.getTime()+ay*365.25*24*3600*1000); ads.push({planet:ap,start:new Date(as),end:ae,years:ay}); as=new Date(ae); });
  const cad=ads.find(d=>now>=d.start&&now<d.end)||ads[0];
  renderDasha(cur,cad,dashas);
}

function castHorary(){
  const lat=parseFloat(document.getElementById('h-lat').value)||userLat||natal.lat||12.9716;
  const lng=parseFloat(document.getElementById('h-lng').value)||userLng||natal.lng||77.5946;
  const houseSystem=document.getElementById('h-house')?.value||'regio';
  const now=new Date();
  const T=(toJD(now)-2451545)/36525;
  const pos=getPlanets(now); const asc=calcAsc(now,lat,lng);
  const houses=calcHouses(asc,lat,houseSystem);
  lastHorary={time:new Date(now),pos,asc,lat,lng,houses,houseSystem};
  renderHoraryPlanets(pos,asc,houses,houseSystem);
  addLog(`Horary chart cast [${houseSystem}]: ${now.toLocaleTimeString()}`);
}

function calcHouses(asc,lat,system){
  // Returns 12 house cusps
  if(system==='whole'){
    // Whole sign — each house = one whole sign from ASC sign
    const ascSign=gSign(asc);
    return Array.from({length:12},(_,i)=>((ascSign+i)*30)%360);
  }
  // For Placidus and Regiomontanus — simplified equal house as fallback
  // (Full Placidus requires iterative solving — approximated here)
  return Array.from({length:12},(_,i)=>n360(asc+i*30));
}

function getHouseNum(lon,houses){
  for(let i=0;i<12;i++){
    const next=houses[(i+1)%12];
    const curr=houses[i];
    if(curr<=next){ if(lon>=curr&&lon<next)return i+1; }
    else{ if(lon>=curr||lon<next)return i+1; }
  }
  return 1;
}

function checkMutualReception(pos){
  const pairs=[];
  const pls=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn'];
  pls.forEach(a=>{ pls.forEach(b=>{ if(a>=b)return;
    const aSign=gSign(pos[a]||0); const bSign=gSign(pos[b]||0);
    if(RULERS[aSign]===b&&RULERS[bSign]===a) pairs.push(`${a} ↔ ${b} (mutual reception)`);
  }); });
  return pairs;
}

function checkAntiscia(pos){
  // Antiscia: reflection over 0 Cancer/Capricorn axis
  const pairs=[];
  const pls=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn'];
  pls.forEach(a=>{ pls.forEach(b=>{ if(a>=b)return;
    const antisA=n360(180-pos[a]); // antiscion of A
    const diff=Math.abs(n360(antisA-pos[b]));
    const angle=diff>180?360-diff:diff;
    if(angle<2) pairs.push(`${a} antiscion conjunct ${b}`);
  }); });
  return pairs;
}

function checkTranslation(pos){
  // Translation of light: faster planet separating from one, applying to another
  const results=[];
  const fastPlanets=['Moon','Mercury','Venus','Sun'];
  const slowPlanets=['Mars','Jupiter','Saturn'];
  fastPlanets.forEach(fp=>{
    if(!pos[fp])return;
    const applying=[]; const separating=[];
    slowPlanets.forEach(sp=>{
      if(!pos[sp])return;
      const diff=n360(pos[fp]-pos[sp]);
      const angle=diff>180?360-diff:diff;
      if(angle<8){ if(diff<180)applying.push(sp); else separating.push(sp); }
    });
    if(applying.length>0&&separating.length>0){
      results.push(`${fp} translates light: separating from ${separating.join(',')} → applying to ${applying.join(',')}`);
    }
  });
  return results;
}

function renderHoraryPlanets(pos,asc,houses,houseSystem){
  const T=(toJD(new Date())-2451545)/36525;
  const ay=getAyanamsa(T);
  let h=`<table class="ptbl"><thead><tr><th>BODY</th><th>LON</th><th>SIGN</th><th>DEG</th><th>HOUSE</th><th>DIG</th><th>NAK (SID)</th></tr></thead><tbody>`;
  h+=`<tr style="background:rgba(0,212,255,0.04)"><td><strong>⬆ ASC</strong></td><td>${asc.toFixed(2)}°</td><td>${SIGNS[gSign(asc)]}</td><td>${gDeg(asc).toFixed(1)}°</td><td>1st</td><td>—</td><td>—</td></tr>`;
  ['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn','Rahu','Ketu'].forEach(p=>{
    if(pos[p]===undefined)return;
    const l=pos[p],si=gSign(l),dig=getDig(p,si),nak=getNak(l,T);
    const house=getHouseNum(l,houses);
    const ordinals=['','1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th','11th','12th'];
    const sidSign=gSign(n360(l-ay));
    h+=`<tr><td><strong>${PSYM[p]||p} ${p}</strong></td><td>${l.toFixed(2)}°</td><td>${SIGNS[si]}</td><td>${gDeg(l).toFixed(1)}°</td><td>${ordinals[house]||house}</td><td class="${dig.c}">${dig.l}</td><td>${nak.name} P${nak.pada} ${SIGNS[sidSign]}</td></tr>`;
  });
  h+='</tbody></table>';
  document.getElementById('h-planets').innerHTML=h;

  const asr=RULERS[gSign(asc)]; const arp=pos[asr]||0;
  const vc=pos.Moon>=195&&pos.Moon<=225;
  const ad=gDeg(asc); const rad=ad<3||ad>27;
  const mutRec=checkMutualReception(pos);
  const antiscia=checkAntiscia(pos);
  const translation=checkTranslation(pos);

  let factors=`<div style="font-size:9px">
    <div style="padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.07)"><span style="color:var(--cyan)">HOUSE SYSTEM:</span> ${houseSystem.toUpperCase()}</div>
    <div style="padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.07)"><span style="color:var(--cyan)">ASC RULER:</span> ${asr} at ${gDeg(arp).toFixed(1)}° ${SIGNS[gSign(arp)]} (${getHouseNum(arp,houses)}th H)</div>
    <div style="padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.07)"><span style="color:var(--cyan)">MOON:</span> ${gDeg(pos.Moon).toFixed(1)}° ${SIGNS[gSign(pos.Moon)]} — ${getNak(pos.Moon,T).name}</div>
    <div style="padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.07)"><span style="color:${vc?'var(--red)':'var(--green)'}">VIA COMBUSTA:</span> ${vc?'YES ⚠ (15°Lib–15°Sco) Moon afflicted':'Clear'}</div>
    <div style="padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.07)"><span style="color:${rad?'var(--orange)':'var(--green)'}">RADICAL:</span> ${rad?'⚠ Early/Late ASC — chart may not be fit to judge':'Chart radical ✓'}</div>`;

  if(mutRec.length){ factors+=`<div style="padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.07)"><span style="color:var(--gold)">MUTUAL RECEPTION:</span> ${mutRec.join('; ')}</div>`; }
  if(antiscia.length){ factors+=`<div style="padding:4px 0;border-bottom:1px solid rgba(0,212,255,0.07)"><span style="color:var(--purple)">ANTISCIA:</span> ${antiscia.join('; ')}</div>`; }
  if(translation.length){ factors+=`<div style="padding:4px 0"><span style="color:var(--orange)">TRANSLATION OF LIGHT:</span> ${translation.join('; ')}</div>`; }
  else { factors+=`<div style="padding:4px 0;color:var(--text-dim)">No translation of light detected.</div>`; }
  factors+='</div>';
  document.getElementById('h-factors').innerHTML=factors;

  // Also pass to interpretation context
  lastHorary.mutRec=mutRec; lastHorary.antiscia=antiscia; lastHorary.translation=translation;
}

const ASPECTS=[
  {name:'Conjunction',symbol:'☌',angle:0,orb:8,type:'conj'},
  {name:'Opposition',symbol:'☍',angle:180,orb:8,type:'opp'},
  {name:'Trine',symbol:'△',angle:120,orb:7,type:'trine'},

];

const KUTA=[
  {name:'Varna',max:1},{name:'Vashya',max:2},{name:'Tara',max:3},{name:'Yoni',max:4},
  {name:'Graha Maitri',max:5},{name:'Gana',max:6},{name:'Bhakoot',max:7},{name:'Nadi',max:8}
];

function calcSynastry(){
  const aName=document.getElementById('syn-a-name').value||'Person A';
  const bName=document.getElementById('syn-b-name').value||'Person B';
  const aDob=document.getElementById('syn-a-dob').value;
  const bDob=document.getElementById('syn-b-dob').value;
  if(!aDob||!bDob){alert('Both birth dates required.');return;}
  const aTob=document.getElementById('syn-a-tob').value||'12:00';
  const bTob=document.getElementById('syn-b-tob').value||'12:00';
  const aLat=parseFloat(document.getElementById('syn-a-lat').value)||userLat||natal.lat||12.97;
  const aLng=parseFloat(document.getElementById('syn-a-lng').value)||userLng||natal.lng||77.59;
  const bLat=parseFloat(document.getElementById('syn-b-lat').value)||12.97;
  const bLng=parseFloat(document.getElementById('syn-b-lng').value)||77.59;

  const aDate=new Date(aDob+'T'+aTob+':00');
  const bDate=new Date(bDob+'T'+bTob+':00');
  const aPos=getPlanets(aDate); const bPos=getPlanets(bDate);
  const aAsc=calcAsc(aDate,aLat,aLng); const bAsc=calcAsc(bDate,bLat,bLng);

  renderSynAspects(aPos,bPos,aName,bName);
  renderKuta(aPos,bPos,aName,bName);
  renderSynCompare(aPos,bPos,aAsc,bAsc,aName,bName);
  addLog(`Synastry: ${aName} × ${bName} calculated.`);
}

function renderSynAspects(aPos,bPos,aName,bName){
  const pls=['Sun','Moon','Mercury','Venus','Mars','Jupiter','Saturn'];
  let aspects=[];
  pls.forEach(ap=>{
    pls.forEach(bp=>{
      if(!aPos[ap]||!bPos[bp])return;
      const diff=Math.abs(n360(aPos[ap]-bPos[bp]));
      const angle=diff>180?360-diff:diff;
      ASPECTS.forEach(asp=>{
        const orb=Math.abs(angle-asp.angle);
        if(orb<=asp.orb) aspects.push({a:ap,b:bp,asp,orb:orb.toFixed(1),angle:angle.toFixed(1)});
      });
    });
  });
  aspects.sort((x,y)=>x.orb-y.orb);
  let h=`<table class="aspect-table"><thead><tr><th>${aName}</th><th>ASP</th><th>${bName}</th><th>ORB</th></tr></thead><tbody>`;
  aspects.slice(0,20).forEach(a=>{
    h+=`<tr><td>${PSYM[a.a]||''} ${a.a}</td><td class="asp-${a.asp.type}">${a.asp.symbol} ${a.asp.name}</td><td>${PSYM[a.b]||''} ${a.b}</td><td>${a.orb}°</td></tr>`;
  });
  h+='</tbody></table>';
  if(aspects.length===0) h='<div style="font-size:9px;color:var(--text-dim)">No major aspects found.</div>';
